name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  titus-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Titus
        run: go install github.com/praetorian-inc/titus/cmd/titus@latest

      - name: Run Titus
        run: titus scan . --format sarif > titus-results.sarif
