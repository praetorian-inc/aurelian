# THROWAWAY test — delete this branch/PR after. Proves claude-code-action's
# structured_output survives step-to-step (no /tmp file handoff).
name: TMP Structured Output Test

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  id-token: write

jobs:
  probe:
    if: startsWith(github.head_ref, 'tmp-structured-output-test')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: tmp-so-test
    steps:
      - name: Run model with json-schema
        id: run
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009  # v1.0.101
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: "false"
          prompt: |
            Run: echo ok
            Return EXACTLY:
            - verdict: "lgtm"
            - review_markdown: "## AI Review\n\nNo issues found — LGTM pending human review."
          claude_args: |
            --allowedTools Bash
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string"},"review_markdown":{"type":"string"}},"required":["verdict","review_markdown"]}'

      - name: Read structured_output in a LATER step
        env:
          SO: ${{ steps.run.outputs.structured_output }}
        run: |
          set -euo pipefail
          echo "=== raw structured_output ==="
          echo "$SO"
          echo "=== parsed ==="
          echo "verdict:  $(echo "$SO" | jq -r '.verdict')"
          echo "review_markdown (first line): $(echo "$SO" | jq -r '.review_markdown' | head -1)"
