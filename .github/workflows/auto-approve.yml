# Auto-Approve: submits ONE counted APPROVE (via GitHub App token) when author +
# every commit are active `nebula` members, checks are green, and the latest
# `## AI Review` comment is an LGTM. Never merges. Fail-closed.
name: Auto-Approve

on:
  issue_comment:
    types: [created]

concurrency:
  group: auto-approve-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TEAM_SLUG: nebula
  ORG: praetorian-inc

jobs:
  gate:
    environment: auto-approve
    # Skip bots; require an `@auto-approve` comment on a PR (not a plain issue).
    if: >
      !contains(github.actor, '[bot]') &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@auto-approve')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Resolve PR number
        id: which
        env:
          NUM: ${{ github.event.issue.number }}   # if: already ensured this is a PR comment
        run: |
          set -euo pipefail
          if [[ -z "${NUM:-}" || "$NUM" == "null" ]]; then
            echo "notpr=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      # Require the commenter to have write access (drive-by guard).
      - name: Verify commenter has write access
        if: steps.which.outputs.notpr != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! PERM=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq .permission 2>/dev/null); then
            echo "::error::cannot read ${ACTOR}'s permission (GITHUB_TOKEN access?); refusing."; exit 1
          fi
          case "$PERM" in
            admin|maintain|write) echo "OK: $ACTOR has $PERM" ;;
            *) echo "::error::$ACTOR lacks write access (got '$PERM'); refusing."; exit 1 ;;
          esac

      # App token: the only identity whose approval counts toward the ruleset.
      - name: Generate App token
        id: apptoken
        if: steps.which.outputs.notpr != 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_APP_PRIVATE_KEY }}

      - name: Evaluate gates and approve
        if: steps.which.outputs.notpr != 'true'
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ steps.which.outputs.number }}
          # ai-review posts as `github-actions[bot]`; the bare login never matches.
          AI_REVIEW_ACTOR: github-actions[bot]
          LGTM_PHRASE: "No issues found — LGTM"
        run: |
          set -euo pipefail

          GATE=""
          pass() { echo "GATE ${GATE}: PASS — $1"; }
          skip() { echo "GATE ${GATE}: FAIL — $1"; echo "DECISION: SKIP (PR #${NUM:-?})"; echo "::notice::auto-approve skipped at gate ${GATE}: $1"; exit 0; }

          GATE="0 (state)"
          PR=$(gh pr view "$NUM" --repo "$REPO" \
                --json state,isDraft,headRefOid,isCrossRepository,author,reviews 2>/dev/null) \
            || skip "cannot read PR #$NUM"

          STATE=$(jq -r '.state' <<<"$PR")
          DRAFT=$(jq -r '.isDraft' <<<"$PR")
          SHA=$(jq -r '.headRefOid' <<<"$PR")
          CROSS_REPO=$(jq -r '.isCrossRepository' <<<"$PR")
          AUTHOR=$(jq -r '.author.login' <<<"$PR")

          [[ "$STATE" == "OPEN" ]]     || skip "PR is $STATE"
          [[ "$DRAFT" == "false" ]]    || skip "PR is a draft"
          [[ "$CROSS_REPO" == "false" ]] || skip "head is on a fork (cross-repository)"

          ALREADY=$(jq -r --arg sha "$SHA" \
            '[.reviews[] | select(.state=="APPROVED" and .commit.oid==$sha)] | length' <<<"$PR" 2>/dev/null || echo 0)
          [[ "${ALREADY:-0}" == "0" ]] || skip "already approved at ${SHA:0:12}"
          pass "open, non-draft, non-fork; not yet approved @ ${SHA:0:12}"

          # Membership helper (cached): is $1 an active nebula member?
          declare -A MCACHE
          BOT_ALLOWLIST="dependabot[bot] github-actions[bot]"
          is_nebula() {
            local login="$1"
            [[ -n "$login" && "$login" != "null" ]] || return 1        # unlinked -> not a member
            case " $BOT_ALLOWLIST " in *" $login "*) return 0 ;; esac    # trusted bot
            if [[ -n "${MCACHE[$login]:-}" ]]; then
              [[ "${MCACHE[$login]}" == "active" ]]; return
            fi
            local st
            st=$(gh api "orgs/${ORG}/teams/${TEAM_SLUG}/memberships/${login}" \
                  --jq '.state' 2>/dev/null || echo "none")
            MCACHE[$login]="$st"
            [[ "$st" == "active" ]]
          }

          GATE="1 (author)"
          is_nebula "$AUTHOR" \
            || skip "author $AUTHOR not an active member of ${TEAM_SLUG}"
          pass "$AUTHOR is an active ${TEAM_SLUG} member"

          GATE="2 (commits)"
          COMMITS=$(gh api "repos/${REPO}/pulls/${NUM}/commits" --paginate \
                     --jq '.[] | {sha: .sha, author: .author.login, committer: .committer.login}' 2>/dev/null) \
            || skip "cannot read commits for PR #$NUM"

          [[ -n "$COMMITS" ]] || skip "no commits found for PR #$NUM"

          N_COMMITS=0
          while IFS=$'\t' read -r c_sha c_author c_committer; do
            N_COMMITS=$((N_COMMITS+1))
            is_nebula "$c_author" \
              || skip "commit ${c_sha:0:12} authored by non-nebula '${c_author}'"
            if [[ "$c_committer" != "web-flow" ]]; then
              is_nebula "$c_committer" \
                || skip "commit ${c_sha:0:12} committed by non-nebula '${c_committer}'"
            fi
          done < <(jq -r '[.sha, (.author // "null"), (.committer // "null")] | @tsv' <<<"$COMMITS")
          pass "all ${N_COMMITS} commits by ${TEAM_SLUG} members (or trusted bots)"

          GATE="3 (checks)"
          CHECKS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" --paginate \
                    --jq '.check_runs[] | {name, status, conclusion}' 2>/dev/null) \
            || skip "cannot read check-runs for $SHA"

          [[ -n "$CHECKS" ]] || skip "no check-runs reported for $SHA"

          PENDING=$(jq -rs '[.[] | select(.status!="completed")] | length' <<<"$CHECKS")
          [[ "$PENDING" == "0" ]] || skip "$PENDING check(s) still running"

          BAD=$(jq -rs '[.[]
                  | select(.status=="completed")
                  | select((.conclusion // "") as $c
                      | ($c=="success" or $c=="neutral" or $c=="skipped") | not)
                  | .name] | join(", ")' <<<"$CHECKS")
          [[ -z "$BAD" ]] || skip "failing/incomplete checks: $BAD"
          N_CHECKS=$(jq -rs 'length' <<<"$CHECKS")
          pass "${N_CHECKS} checks green, 0 pending @ ${SHA:0:12}"

          # Bind the LGTM to the exact reviewed commit via ai-review's SHA marker.
          GATE="4 (AI review)"
          SHA_MARKER="<!-- reviewed-sha: ${SHA} -->"
          REVIEW=$(gh api "repos/${REPO}/issues/${NUM}/comments" --paginate \
                    --jq "[.[] | select(.user.login==\"${AI_REVIEW_ACTOR}\") | select(.body | contains(\"## AI Review\"))] | last" 2>/dev/null) \
            || skip "cannot read PR comments"

          [[ -n "$REVIEW" && "$REVIEW" != "null" ]] \
            || skip "no AI Review comment found"

          jq -e --arg m "$SHA_MARKER" '.body | contains($m)' <<<"$REVIEW" >/dev/null \
            || skip "AI Review is not for the current head ${SHA:0:12}; re-run @ai-review"

          if ! jq -e --arg p "$LGTM_PHRASE" \
                '.body | split("\n") | map(gsub("^\\s+";"")) | any(startswith($p))' \
                <<<"$REVIEW" >/dev/null; then
            skip "latest AI Review is not a clear LGTM for the current head"
          fi
          pass "LGTM for reviewed-sha ${SHA:0:12}"

          # TOCTOU guard: re-read head and require it unchanged before approving.
          NOW_SHA=$(gh api "repos/${REPO}/pulls/${NUM}" --jq '.head.sha' 2>/dev/null) \
            || skip "cannot re-read head before approving"
          [[ "$NOW_SHA" == "$SHA" ]] \
            || skip "head moved during evaluation ($SHA -> $NOW_SHA); re-run after CI"

          echo "DECISION: APPROVE PR #${NUM} @ ${SHA:0:12}"
          BODY=$(cat <<EOF
          ✅ Auto-approved by policy gate.

          - Author \`${AUTHOR}\` is an active member of \`${ORG}/${TEAM_SLUG}\`.
          - Every commit authored & committed by \`${TEAM_SLUG}\` members (or trusted bots).
          - All checks on \`${SHA:0:12}\` are green.
          - AI Review verdict: clear (\`${LGTM_PHRASE}\`).

          This is an advisory automated approval. A human must still merge.
          EOF
          )

          # Pin the approval to the validated commit via commit_id.
          gh api "repos/${REPO}/pulls/${NUM}/reviews" \
            -f "commit_id=${SHA}" -f "event=APPROVE" -f "body=${BODY}" >/dev/null \
            || skip "approve call failed (head may have moved to reject commit_id ${SHA:0:12})"
          echo "::notice::Approved PR #$NUM at $SHA"
