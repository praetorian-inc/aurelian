id: "5.1.5.2"
title: "Ensure the admin consent workflow is enabled"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that the admin consent workflow is enabled so users can
  request admin approval for applications they cannot consent to
  themselves.
rationale: |
  Without an admin consent workflow, users who cannot consent to
  applications may resort to shadow IT or social engineering
  administrators. The workflow provides a structured process for
  evaluating application permission requests.
impact: |
  Administrators will receive consent requests that require review,
  adding administrative overhead but improving application governance.
remediation: |
  Navigate to Entra ID > Enterprise applications > Consent and
  permissions > Admin consent settings and enable the admin consent
  workflow, designating appropriate reviewers.
references:
  - "https://learn.microsoft.com/en-us/entra/identity/enterprise-apps/configure-admin-consent-workflow"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.1.5.2"
cis_controls:
  - "v8: 2.5"
  - "v8: 2.7"
guard:
  finding_slug: "m365-cis-5-1-5-2-admin-consent-workflow"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-862"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:R/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
