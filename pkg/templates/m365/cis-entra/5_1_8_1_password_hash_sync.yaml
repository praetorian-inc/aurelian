id: "5.1.8.1"
title: "Ensure password hash sync is enabled for hybrid deployments"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that password hash synchronization is enabled for organizations
  using hybrid identity with Azure AD Connect.
rationale: |
  Password hash sync provides a backup authentication path when
  federation services are unavailable and enables leaked credential
  detection through Entra ID Identity Protection. Without it,
  compromised credentials from external breaches cannot be detected.
impact: |
  Password hashes will be synchronized to Entra ID, which may require
  security review for compliance. This is a standard Microsoft
  recommended configuration for hybrid environments.
remediation: |
  Enable password hash synchronization in Azure AD Connect
  configuration. Navigate to Azure AD Connect > Optional features
  and select "Password hash synchronization".
references:
  - "https://learn.microsoft.com/en-us/entra/identity/hybrid/connect/whatis-phs"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.1.8.1"
cis_controls:
  - "v8: 6.3"
  - "v8: 16.1"
guard:
  finding_slug: "m365-cis-5-1-8-1-password-hash-sync"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-287"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - directory_sync_settings
  - hybrid_identity_config
