id: "5.2.2.9"
title: "Ensure a managed device is required for MFA registration"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that a Conditional Access policy requires a compliant or
  hybrid Azure AD joined device when users register for MFA methods.
rationale: |
  If attackers compromise a user's credentials before MFA is
  registered, they could register their own MFA methods. Requiring
  a managed device for MFA registration ensures only corporate
  devices can be used to set up authentication methods.
impact: |
  Users must register MFA methods from compliant or domain-joined
  devices. BYOD users may need to first enroll their device.
remediation: |
  Create a Conditional Access policy targeting all users with the
  user action "Register security information" and a grant control
  requiring a compliant or hybrid Azure AD joined device.
references:
  - "https://learn.microsoft.com/en-us/entra/identity/conditional-access/howto-conditional-access-policy-registration"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.2.2.9"
cis_controls:
  - "v8: 6.3"
  - "v8: 6.4"
guard:
  finding_slug: "m365-cis-5-2-2-9-managed-device-required"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-308"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:N/SC:H/SI:H/SA:N"
data_requirements:
  - conditional_access_policies
  - device_compliance_policies
