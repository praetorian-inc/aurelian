id: "5.2.2.2"
title: "Ensure multifactor authentication is required for all users"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that a Conditional Access policy requires MFA for all users
  in the tenant.
rationale: |
  MFA for all users provides defense-in-depth against credential
  compromise for standard user accounts, not just administrators.
impact: |
  All users must enroll in MFA. This may impact service accounts
  that do not support interactive MFA.
remediation: |
  Create a Conditional Access policy targeting "All users" with a
  grant control requiring multifactor authentication. Exclude
  break-glass accounts and service principals as needed.
references:
  - "https://learn.microsoft.com/en-us/entra/identity/conditional-access/howto-conditional-access-policy-all-users-mfa"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.2.2.2"
cis_controls:
  - "v8: 6.3"
  - "v8: 6.4"
guard:
  finding_slug: "m365-cis-5-2-2-2-mfa-all-users"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-308"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:N/SC:H/SI:H/SA:N"
data_requirements:
  - conditional_access_policies
