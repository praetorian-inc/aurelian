id: "5.1.6.3"
title: "Ensure guest invitations are restricted to admins only"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that only administrators can invite guest users to the
  Entra ID tenant. Standard users and guest users should not have
  invite permissions.
rationale: |
  Unrestricted guest invitation permissions allow any user to bring
  external identities into the tenant. This increases the attack
  surface and can lead to unauthorized data access if guests are
  granted excessive permissions.
impact: |
  Users will need to request administrator assistance to invite
  guests, which may slow down collaboration with external partners.
remediation: |
  Navigate to Entra ID > External Identities > External collaboration
  settings and set "Guest invite restrictions" to "Only users assigned
  to specific admin roles can invite guest users".
references:
  - "https://learn.microsoft.com/en-us/entra/external-id/external-collaboration-settings-configure"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.1.6.3"
cis_controls:
  - "v8: 6.1"
  - "v8: 6.8"
guard:
  finding_slug: "m365-cis-5-1-6-3-guest-invites-admin-only"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-732"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - external_collaboration_settings
