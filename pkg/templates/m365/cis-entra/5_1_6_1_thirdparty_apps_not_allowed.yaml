id: "5.1.6.1"
title: "Ensure third-party integrated applications are not allowed"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that users cannot register or consent to third-party
  integrated applications in the Entra ID tenant.
rationale: |
  Third-party applications with excessive permissions can be used as
  an attack vector to access organizational data. Disabling third-party
  app integrations reduces the risk of data exfiltration through
  malicious or overly permissive applications.
impact: |
  Users will be unable to integrate third-party applications without
  administrator approval, potentially affecting productivity tools.
remediation: |
  Navigate to Entra ID > User settings and set "Users can register
  applications" to "No". Additionally, disable enterprise application
  user settings for third-party apps.
references:
  - "https://learn.microsoft.com/en-us/entra/identity/enterprise-apps/configure-user-consent"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.1.6.1"
cis_controls:
  - "v8: 2.5"
  - "v8: 2.7"
guard:
  finding_slug: "m365-cis-5-1-6-1-thirdparty-apps-not-allowed"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-862"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - authorization_policy
  - enterprise_app_settings
