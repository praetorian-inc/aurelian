id: "5.3.1"
title: "Ensure legacy authentication is blocked via Conditional Access"
service: entra
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that a Conditional Access policy blocks legacy authentication
  protocols (Exchange ActiveSync, other clients) for all users.
rationale: |
  Legacy authentication protocols (IMAP, POP3, SMTP basic auth,
  ActiveSync) do not support MFA and are a primary attack vector
  for password spray and credential stuffing attacks.
impact: |
  Applications using legacy authentication will stop working. Users
  must migrate to modern authentication clients.
remediation: |
  Create a Conditional Access policy targeting "All users" with
  client app conditions set to "Exchange ActiveSync clients" and
  "Other clients", with a grant control of "Block access".
references:
  - "https://learn.microsoft.com/en-us/entra/identity/conditional-access/howto-conditional-access-policy-block-legacy"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 5.3.1"
cis_controls:
  - "v8: 4.8"
guard:
  finding_slug: "m365-cis-5-3-1-block-legacy-auth"
  phase_tag: "phase_m365_entra"
  asset_type: "m365tenant"
  cwe: "CWE-287"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:N/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - conditional_access_policies
