id: "7.3.2"
title: "Ensure OneDrive sync is restricted to domain-joined devices"
service: sharepoint
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that OneDrive sync client is restricted to only synchronize
  data to domain-joined or compliant devices.
rationale: |
  Without sync restrictions, users can synchronize organizational
  data to personal or unmanaged devices, creating copies of
  sensitive data outside of organizational control. Restricting sync
  to managed devices ensures data remains on protected endpoints.
impact: |
  Users will only be able to sync OneDrive content on domain-joined
  or compliant devices. Personal devices will be limited to web
  access only.
remediation: |
  Run Set-SPOTenant -AllowedDomainListForSyncClient
  -TenantRestrictionEnabled $true in SharePoint Online PowerShell
  to restrict sync to domain-joined devices.
references:
  - "https://learn.microsoft.com/en-us/sharepoint/allow-syncing-only-on-specific-domains"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 7.3.2"
cis_controls:
  - "v8: 3.3"
guard:
  finding_slug: "m365-cis-7-3-2-onedrive-sync-restricted"
  phase_tag: "phase_m365_sharepoint"
  asset_type: "m365tenant"
  cwe: "CWE-200"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - spo_tenant_settings
