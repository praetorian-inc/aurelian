id: "7.2.1"
title: "Ensure modern authentication for SharePoint applications is required"
service: sharepoint
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that modern authentication is required for SharePoint
  Online and legacy authentication protocols are blocked.
rationale: |
  Legacy authentication protocols do not support MFA or conditional
  access, making them vulnerable to credential stuffing and brute
  force attacks. Requiring modern authentication ensures all
  SharePoint access is protected by organizational security policies.
impact: |
  Legacy applications that only support basic authentication will
  be unable to access SharePoint. Users may need to update clients.
remediation: |
  Run Set-SPOTenant -LegacyAuthProtocolsEnabled $false in SharePoint
  Online PowerShell to disable legacy authentication protocols.
references:
  - "https://learn.microsoft.com/en-us/sharepoint/control-access-from-unmanaged-devices"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 7.2.1"
cis_controls:
  - "v8: 6.3"
  - "v8: 6.4"
guard:
  finding_slug: "m365-cis-7-2-1-modern-auth-required"
  phase_tag: "phase_m365_sharepoint"
  asset_type: "m365tenant"
  cwe: "CWE-287"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:N/SC:H/SI:H/SA:N"
data_requirements:
