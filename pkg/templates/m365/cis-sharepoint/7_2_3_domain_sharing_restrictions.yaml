id: "7.2.3"
title: "Ensure SharePoint external sharing is managed through domain allowlists or denylists"
service: sharepoint
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that SharePoint external sharing is restricted to specific
  approved domains using domain allowlists or denylists.
rationale: |
  Without domain restrictions, users can share content with any
  external email domain. Domain allowlists restrict sharing to
  approved partner organizations, while denylists block known
  risky domains. Both approaches reduce the risk of data
  exfiltration to unauthorized parties.
impact: |
  Users will only be able to share externally with approved domains.
  New partner domains must be explicitly added to the allowlist.
remediation: |
  Run Set-SPOTenant -SharingDomainRestrictionMode AllowList
  -SharingAllowedDomainList "domain1.com domain2.com" in SharePoint
  Online PowerShell to restrict sharing to approved domains.
references:
  - "https://learn.microsoft.com/en-us/sharepoint/restricted-domains-sharing"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 7.2.3"
cis_controls:
  - "v8: 3.3"
  - "v8: 6.8"
guard:
  finding_slug: "m365-cis-7-2-3-domain-sharing-restrictions"
  phase_tag: "phase_m365_sharepoint"
  asset_type: "m365tenant"
  cwe: "CWE-732"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - spo_tenant_settings
