id: "7.2.2"
title: "Ensure that guests cannot reshare content"
service: sharepoint
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that guest users are prevented from resharing files,
  folders, and sites that have been shared with them.
rationale: |
  If guests can reshare content, they can extend access to
  additional external users beyond the original sharing intent.
  This creates uncontrolled data distribution chains that bypass
  organizational sharing governance and DLP policies.
impact: |
  Guest users will be unable to share content with additional
  external users. They retain access to content shared directly
  with them.
remediation: |
  Run Set-SPOTenant -PreventExternalUsersFromResharing $true in
  SharePoint Online PowerShell to prevent guest resharing.
references:
  - "https://learn.microsoft.com/en-us/sharepoint/external-sharing-overview"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 7.2.2"
cis_controls:
  - "v8: 3.3"
guard:
  finding_slug: "m365-cis-7-2-2-guests-no-reshare"
  phase_tag: "phase_m365_sharepoint"
  asset_type: "m365tenant"
  cwe: "CWE-732"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - spo_tenant_settings
