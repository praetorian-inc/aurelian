id: "2.1.5"
title: "Ensure Safe Attachments for SharePoint, OneDrive, and Teams is enabled"
service: defender
level: L2
profile: "E5 Level 2"
execution: Automated
severity: high
description: |
  Verify that Safe Attachments is enabled for SharePoint, OneDrive,
  and Microsoft Teams to scan files uploaded to these services.
rationale: |
  Malicious files can be uploaded to SharePoint, OneDrive, and Teams
  where they may be shared broadly within the organization. Safe
  Attachments for these services detects and blocks malicious files
  after upload, preventing lateral spread of malware.
impact: |
  Files identified as malicious will be blocked from download or
  opening. Scanning may introduce minor delays for file access.
remediation: |
  Navigate to Microsoft 365 Defender > Policies & rules > Threat
  policies > Safe Attachments > Global settings and enable
  "Turn on Defender for Office 365 for SharePoint, OneDrive, and
  Microsoft Teams".
references:
  - "https://learn.microsoft.com/en-us/defender-office-365/safe-attachments-for-spo-odfb-teams-about"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 2.1.5"
cis_controls:
  - "v8: 9.3"
  - "v8: 9.7"
guard:
  finding_slug: "m365-cis-2-1-5-atp-spo-onedrive-teams"
  phase_tag: "phase_m365_defender"
  asset_type: "m365tenant"
  cwe: "CWE-1188"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - safe_attachments_global_settings
