id: "2.1.13"
title: "Ensure the connection filter safe list is not enabled"
service: defender
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that the connection filter safe list (EnableSafeList) is
  disabled in the hosted connection filter policy.
rationale: |
  The safe list uses Microsoft's third-party trusted IP list to
  bypass spam filtering. This list may include IPs that have been
  compromised or are used by attackers, creating a bypass path for
  malicious email delivery.
impact: |
  Disabling the safe list may increase spam filtering for some
  senders, but improves overall threat detection accuracy.
remediation: |
  Navigate to Microsoft 365 Defender > Policies & rules > Threat
  policies > Anti-spam > Connection filter policy and ensure the
  "Turn on safe list" option is disabled.
references:
  - "https://learn.microsoft.com/en-us/defender-office-365/connection-filter-policies-configure"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 2.1.13"
cis_controls:
  - "v8: 9.3"
guard:
  finding_slug: "m365-cis-2-1-13-connection-filter-safe-list-off"
  phase_tag: "phase_m365_defender"
  asset_type: "m365tenant"
  cwe: "CWE-16"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - connection_filter_policy
