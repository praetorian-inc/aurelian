id: "2.1.15"
title: "Ensure outbound spam notifications are configured"
service: defender
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that the outbound spam filter policy is configured to notify
  administrators when outbound spam is detected from tenant users.
rationale: |
  Outbound spam from tenant accounts indicates compromised user
  accounts being used to send spam or phishing. Without notifications,
  administrators may be unaware of compromised accounts, allowing
  attackers to maintain persistent access.
impact: |
  Administrators will receive notification emails when outbound spam
  is detected, which may add to email volume but provides critical
  security alerting.
remediation: |
  Navigate to Microsoft 365 Defender > Policies & rules > Threat
  policies > Anti-spam > Outbound policy and configure BCC or
  notification recipients for outbound spam events.
references:
  - "https://learn.microsoft.com/en-us/defender-office-365/outbound-spam-policies-configure"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 2.1.15"
cis_controls:
  - "v8: 9.3"
  - "v8: 13.2"
guard:
  finding_slug: "m365-cis-2-1-15-outbound-spam-policy"
  phase_tag: "phase_m365_defender"
  asset_type: "m365tenant"
  cwe: "CWE-778"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - outbound_spam_policies
