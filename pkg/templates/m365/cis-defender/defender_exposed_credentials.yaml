id: "defender.exposed.credentials"
title: "Ensure exposed credential alerts are monitored"
service: defender
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that Microsoft Defender is configured to detect and alert
  on exposed credentials, including leaked password detection and
  credential exposure from dark web monitoring.
rationale: |
  Exposed credentials from data breaches and dark web leaks are
  frequently used for credential stuffing and account takeover
  attacks. Monitoring for exposed credentials enables proactive
  remediation before attackers exploit them.
impact: |
  Users with exposed credentials will be flagged for password reset,
  which may cause temporary access disruption but prevents account
  compromise.
remediation: |
  Ensure Microsoft Defender for Identity and Entra ID Identity
  Protection are configured with password hash sync enabled to detect
  leaked credentials. Review and respond to exposed credential alerts.
references:
  - "https://learn.microsoft.com/en-us/entra/id-protection/concept-identity-protection-risks"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0"
cis_controls:
  - "v8: 16.1"
  - "v8: 16.4"
guard:
  finding_slug: "m365-cis-defender-exposed-credentials"
  phase_tag: "phase_m365_defender"
  asset_type: "m365tenant"
  cwe: "CWE-200"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:N/SC:H/SI:H/SA:N"
data_requirements:
  - identity_protection_alerts
  - credential_exposure_reports
