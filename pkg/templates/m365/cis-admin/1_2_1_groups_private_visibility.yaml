id: "1.2.1"
title: "Ensure Microsoft 365 Groups default visibility is set to Private"
service: admin
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that the default visibility for new Microsoft 365 Groups
  is set to Private rather than Public.
rationale: |
  Public groups allow any user in the organization to access group
  content without explicit membership. A Private default ensures
  new groups require explicit membership grants, reducing the risk
  of accidental data exposure to unauthorized internal users.
impact: |
  New groups will default to Private visibility. Group owners can
  still explicitly create Public groups when needed.
remediation: |
  Navigate to Microsoft 365 Admin Center > Settings > Org settings >
  Microsoft 365 Groups and set the default privacy to "Private".
references:
  - "https://learn.microsoft.com/en-us/microsoft-365/admin/create-groups/compare-groups"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 1.2.1"
cis_controls:
  - "v8: 3.3"
guard:
  finding_slug: "m365-cis-1-2-1-groups-private-visibility"
  phase_tag: "phase_m365_admin"
  asset_type: "m365tenant"
  cwe: "CWE-732"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - group_settings
