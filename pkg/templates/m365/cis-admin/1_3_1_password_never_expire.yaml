id: "1.3.1"
title: "Ensure the password expiration policy is set to not expire"
service: admin
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that the organizational password policy is set to never
  expire passwords, relying instead on MFA and risk-based detection.
rationale: |
  NIST SP 800-63B and Microsoft both recommend against periodic
  password expiration. Forced password changes lead to predictable
  password patterns and weaker passwords. Combined with MFA, non-
  expiring passwords with breach detection provide stronger security.
impact: |
  Users will no longer be prompted to change passwords periodically.
  This must be combined with MFA enforcement and leaked credential
  detection for adequate security.
remediation: |
  Navigate to Microsoft 365 Admin Center > Settings > Org settings >
  Security & privacy > Password expiration policy and set passwords
  to never expire.
references:
  - "https://learn.microsoft.com/en-us/microsoft-365/admin/manage/set-password-expiration-policy"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 1.3.1"
cis_controls:
  - "v8: 5.2"
guard:
  finding_slug: "m365-cis-1-3-1-password-never-expire"
  phase_tag: "phase_m365_admin"
  asset_type: "m365tenant"
  cwe: "CWE-16"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - password_policy
