id: "1.3.6"
title: "Ensure Customer Lockbox is enabled"
service: admin
level: L2
profile: "E5 Level 2"
execution: Automated
severity: high
description: |
  Verify that Customer Lockbox is enabled, requiring Microsoft
  support engineers to obtain explicit approval before accessing
  tenant data during support operations.
rationale: |
  Customer Lockbox provides an additional layer of control by
  requiring organizational approval before Microsoft personnel can
  access tenant data. Without Lockbox, Microsoft support may access
  data during service operations without explicit customer consent.
impact: |
  Microsoft support requests will require explicit approval from a
  designated approver, which may add time to support incident
  resolution.
remediation: |
  Navigate to Microsoft 365 Admin Center > Settings > Org settings >
  Security & privacy > Customer Lockbox and enable the feature.
references:
  - "https://learn.microsoft.com/en-us/purview/customer-lockbox-requests"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 1.3.6"
cis_controls:
  - "v8: 6.1"
  - "v8: 6.5"
guard:
  finding_slug: "m365-cis-1-3-6-customer-lockbox-enabled"
  phase_tag: "phase_m365_admin"
  asset_type: "m365tenant"
  cwe: "CWE-862"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:H/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
