id: "3.1.1"
title: "Ensure Microsoft 365 audit log search is enabled"
service: purview
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that unified audit log search is enabled in Microsoft
  Purview to capture and retain audit events across all Microsoft
  365 services.
rationale: |
  The unified audit log is the primary source of security telemetry
  for Microsoft 365. Without audit logging enabled, security
  incidents cannot be detected, investigated, or forensically
  analyzed. This is a foundational security control.
impact: |
  Enabling audit log search has minimal operational impact. Audit
  data retention is governed by license type and retention policies.
remediation: |
  Navigate to Microsoft Purview compliance portal > Audit and click
  "Start recording user and admin activity" if not already enabled.
  Alternatively, run Set-AdminAuditLogConfig -UnifiedAuditLogIngestionEnabled
  $true in Exchange Online PowerShell.
references:
  - "https://learn.microsoft.com/en-us/purview/audit-log-enable-disable"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 3.1.1"
cis_controls:
  - "v8: 8.2"
  - "v8: 8.5"
guard:
  finding_slug: "m365-cis-3-1-1-audit-log-search-enabled"
  phase_tag: "phase_m365_purview"
  asset_type: "m365tenant"
  cwe: "CWE-778"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - admin_audit_log_config
