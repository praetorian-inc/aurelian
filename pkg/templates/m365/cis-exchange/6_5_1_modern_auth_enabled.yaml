id: "6.5.1"
title: "Ensure modern authentication for Exchange Online is enabled"
service: exchange
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that modern authentication (OAuth 2.0) is enabled for
  Exchange Online and basic authentication is disabled.
rationale: |
  Basic authentication transmits credentials in base64 encoding and
  does not support MFA. Enabling modern authentication and disabling
  basic authentication forces all clients to use OAuth 2.0, which
  supports MFA and conditional access policies.
impact: |
  Legacy email clients that only support basic authentication will
  stop working. Users may need to update their email clients.
remediation: |
  Run Set-OrganizationConfig -OAuth2ClientProfileEnabled $true in
  Exchange Online PowerShell. Additionally, configure authentication
  policies to block basic authentication protocols.
references:
  - "https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-online/enable-or-disable-modern-authentication-in-exchange-online"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 6.5.1"
cis_controls:
  - "v8: 6.3"
  - "v8: 6.4"
guard:
  finding_slug: "m365-cis-6-5-1-modern-auth-enabled"
  phase_tag: "phase_m365_exchange"
  asset_type: "m365tenant"
  cwe: "CWE-287"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:N/SC:H/SI:H/SA:N"
data_requirements:
