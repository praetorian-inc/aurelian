id: "6.5.2"
title: "Ensure MailTips are enabled for end users"
service: exchange
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that MailTips are enabled to warn users about potential
  issues when composing emails, such as sending to large groups or
  external recipients.
rationale: |
  MailTips provide real-time warnings that help prevent accidental
  data disclosure, such as sending sensitive information to external
  recipients or large distribution groups. Without MailTips, users
  lack contextual awareness about their email actions.
impact: |
  Users will see informational MailTips when composing emails. This
  is non-disruptive and provides helpful context for email actions.
remediation: |
  Run Set-OrganizationConfig -MailTipsAllTipsEnabled $true
  -MailTipsExternalRecipientsTipsEnabled $true
  -MailTipsGroupMetricsEnabled $true -MailTipsLargeAudienceThreshold 25
  in Exchange Online PowerShell.
references:
  - "https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-online/mailtips/mailtips"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 6.5.2"
cis_controls:
  - "v8: 14.1"
guard:
  finding_slug: "m365-cis-6-5-2-mailtips-enabled"
  phase_tag: "phase_m365_exchange"
  asset_type: "m365tenant"
  cwe: "CWE-200"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - organization_config
