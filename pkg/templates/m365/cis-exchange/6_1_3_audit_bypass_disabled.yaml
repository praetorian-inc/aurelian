id: "6.1.3"
title: "Ensure mailbox audit bypass is not enabled for any accounts"
service: exchange
level: L1
profile: "E3 Level 1"
execution: Automated
severity: high
description: |
  Verify that no user or service accounts have the audit bypass
  association enabled, which would exclude their actions from
  mailbox audit logs.
rationale: |
  The audit bypass feature allows specific accounts to perform
  mailbox operations without generating audit records. If a
  compromised account has audit bypass enabled, all malicious
  actions would be invisible to investigators.
impact: |
  Removing audit bypass from accounts may generate additional audit
  log entries for service accounts, increasing log volume but
  ensuring complete audit coverage.
remediation: |
  Run Get-MailboxAuditBypassAssociation -ResultSize Unlimited to
  identify accounts with bypass enabled, then remove bypass with
  Set-MailboxAuditBypassAssociation -Identity <user> -AuditBypassEnabled
  $false.
references:
  - "https://learn.microsoft.com/en-us/powershell/module/exchange/set-mailboxauditbypassassociation"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 6.1.3"
cis_controls:
  - "v8: 8.2"
  - "v8: 8.5"
guard:
  finding_slug: "m365-cis-6-1-3-audit-bypass-disabled"
  phase_tag: "phase_m365_exchange"
  asset_type: "m365tenant"
  cwe: "CWE-778"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:H/UI:N/VC:H/VI:H/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - mailbox_audit_bypass_associations
