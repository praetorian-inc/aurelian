id: "6.3.1"
title: "Ensure users installing Outlook add-ins is not allowed"
service: exchange
level: L1
profile: "E3 Level 1"
execution: Automated
severity: medium
description: |
  Verify that users are prevented from installing Outlook add-ins
  from the Office Store without administrator approval.
rationale: |
  Outlook add-ins can access email content, calendar data, and
  contacts. Unrestricted add-in installation allows users to grant
  third-party applications access to sensitive organizational data
  without security review.
impact: |
  Users will be unable to install Outlook add-ins without
  administrator approval. Pre-approved add-ins can be deployed
  centrally.
remediation: |
  Navigate to Exchange Admin Center > Roles > User roles and disable
  "My Marketplace Apps" and "My Custom Apps" to prevent user-initiated
  add-in installation.
references:
  - "https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-online/add-ins-for-outlook/specify-who-can-install-and-manage-add-ins"
  - "CIS Microsoft 365 Foundations Benchmark v6.0.0 Section 6.3.1"
cis_controls:
  - "v8: 2.5"
  - "v8: 2.7"
guard:
  finding_slug: "m365-cis-6-3-1-outlook-addins-disabled"
  phase_tag: "phase_m365_exchange"
  asset_type: "m365tenant"
  cwe: "CWE-862"
  cvss_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:L/VI:L/VA:N/SC:N/SI:N/SA:N"
data_requirements:
  - owa_mailbox_policy
