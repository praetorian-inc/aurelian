id: azure/enrich/can-escalate-auth-admin
name: Authentication Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Authentication Administrators can reset MFA and passwords for non-admin users.
  Creates CAN_ESCALATE edges to users without privileged directory roles.
severity: high
order: 53
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName = 'Authentication Administrator'
     OR rd.templateId = 'c4e39bd9-1100-46d3-8c65-fb160da0071f'
  SET attacker._canEscalateViaPasswordReset = true, attacker._canEscalate = true
  WITH attacker, perm
  MATCH (target:User)
  WHERE target <> attacker
    AND NOT EXISTS {
      MATCH (target)-[:HAS_PERMISSION]->(adminRd:RoleDefinition)
      WHERE NOT adminRd.templateId IN [
        'c4e39bd9-1100-46d3-8c65-fb160da0071f',
        '88d8e3e3-8f55-4a1e-953a-9b9898b8876b',
        '95e79109-95c0-4d8e-aee3-d01accf2d47b',
        '790c1fb9-7f7d-4f88-86a1-ef1f95c05c1b',
        '966707d0-3269-4727-9be2-8c3a10f19b9d',
        '4a5d8f65-41da-4de4-8968-e035b65339cf',
        '27460883-1df1-4691-b032-3b79643e5e63',
        '75934031-6c7e-415a-99d7-48dbd49e875e'
      ]
    }
  WITH DISTINCT attacker, target, perm
  CALL {
    WITH attacker, target, perm
    MERGE (attacker)-[r:CAN_ESCALATE {method: 'PasswordResetViaAuthAdmin'}]->(target)
    ON CREATE SET
      r.condition = 'Can reset passwords and authentication methods for users with no admin roles or specific low-privilege admin roles',
      r.category = 'DirectoryRole',
      r.source = perm.source
  } IN TRANSACTIONS OF 10000 ROWS
  RETURN count(*) AS created
