id: azure/enrich/can-escalate-global-admin-password
name: Global Administrator Password Reset Escalation
platform: azure
type: enrich
category: escalation
description: |
  Global Administrators can reset passwords for ANY user including other
  Global Administrators. This is a distinct escalation method from the
  general Global Admin control path, specifically via password reset.
severity: critical
order: 62
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName = 'Global Administrator'
     OR rd.templateId = '62e90394-69f5-4237-9190-012177145e10'
  WITH attacker, perm
  MATCH (target:User)
  WHERE target <> attacker
  WITH DISTINCT attacker, target, perm
  CALL {
    WITH attacker, target, perm
    MERGE (attacker)-[r:CAN_ESCALATE {method: 'PasswordResetViaGlobalAdmin'}]->(target)
    ON CREATE SET
      r.condition = 'Can reset passwords for ANY user including other Global Administrators',
      r.category = 'DirectoryRole',
      r.source = perm.source
  } IN TRANSACTIONS OF 10000 ROWS
  RETURN count(*) AS created
