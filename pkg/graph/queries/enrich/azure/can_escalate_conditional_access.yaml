id: azure/enrich/can-escalate-conditional-access
name: Conditional Access Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Conditional Access Administrators can modify or disable security policies
  (MFA, device compliance, IP restrictions), weakening the security posture
  for all users and enabling further attacks.
severity: high
order: 55
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName = 'Conditional Access Administrator'
     OR rd.templateId = 'b1be1c3e-b65d-4f19-8427-f6fa0d97feb9'
  SET attacker._canEscalateViaPolicyBypass = true, attacker._canEscalate = true
  RETURN count(attacker) AS condAccessAdmins
