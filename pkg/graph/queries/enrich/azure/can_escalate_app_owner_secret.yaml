id: azure/enrich/can-escalate-app-owner-secret
name: Application Owner Secret Injection Escalation
platform: azure
type: enrich
category: escalation
description: |
  Application owners can add client secrets to the application's corresponding
  service principal. If the SP has privileged permissions, the owner can
  authenticate as the SP and inherit those permissions.
severity: critical
order: 90
cypher: |
  MATCH (owner)-[:OWNS]->(app:Application)
  WITH owner, app
  MATCH (sp:ServicePrincipal)
  WHERE sp.appId = app.appId
  WITH DISTINCT owner, sp
  MERGE (owner)-[r:CAN_ESCALATE {method: 'ApplicationAddSecret'}]->(sp)
  ON CREATE SET
    r.condition = 'Application owner can add secrets to corresponding service principal and authenticate as it',
    r.category = 'ApplicationOwnership'
  RETURN count(r) AS created
