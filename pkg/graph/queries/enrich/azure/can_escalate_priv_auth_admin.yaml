id: azure/enrich/can-escalate-priv-auth-admin
name: Privileged Authentication Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Privileged Authentication Administrators can reset passwords and
  authentication methods for ANY user including Global Administrators.
  Creates CAN_ESCALATE edges to all users.
severity: critical
order: 54
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName = 'Privileged Authentication Administrator'
     OR rd.templateId = '7be44c8a-adaf-4e2a-84d6-ab2649e08a13'
  SET attacker._canEscalate = true
  WITH attacker, perm
  MATCH (target:User)
  WHERE target <> attacker
  WITH DISTINCT attacker, target, perm
  MERGE (attacker)-[r:CAN_ESCALATE {method: 'PasswordResetViaPrivilegedAuthAdmin'}]->(target)
  ON CREATE SET
    r.condition = 'Can reset passwords and authentication methods for ANY user including Global Administrators',
    r.category = 'DirectoryRole',
    r.source = perm.source
  RETURN count(r) AS created
