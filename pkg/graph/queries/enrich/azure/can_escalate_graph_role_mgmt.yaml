id: azure/enrich/can-escalate-graph-role-mgmt
name: Graph API RoleManagement.ReadWrite.Directory Escalation
platform: azure
type: enrich
category: escalation
description: |
  Service principals with RoleManagement.ReadWrite.Directory application
  permission can directly assign Global Administrator or any other directory
  role to any principal.
severity: critical
order: 70
cypher: |
  MATCH (attacker:ServicePrincipal)-[perm:HAS_PERMISSION {source: 'Microsoft Graph App Role'}]->(resource:ServicePrincipal)
  WHERE perm.appRoleId IS NOT NULL
  WITH attacker, perm
  MATCH (attacker)-[perm2:HAS_PERMISSION]->(resource2:ServicePrincipal)
  WHERE resource2.displayName = 'Microsoft Graph' OR resource2.appId = '00000003-0000-0000-c000-000000000000'
  SET attacker._canEscalate = true
  WITH attacker
  MATCH (target:Principal)
  WHERE target <> attacker
  WITH DISTINCT attacker, target
  CALL {
    WITH attacker, target
    MERGE (attacker)-[r:CAN_ESCALATE {method: 'GraphRoleManagement'}]->(target)
    ON CREATE SET
      r.condition = 'Service Principal with RoleManagement.ReadWrite.Directory can assign Global Administrator or any directory role to any principal',
      r.category = 'GraphPermission'
  } IN TRANSACTIONS OF 10000 ROWS
  RETURN count(*) AS created
