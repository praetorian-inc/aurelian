id: azure/enrich/can-escalate-password-admin
name: Password Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Password Administrators can reset passwords for non-admin users. Creates
  CAN_ESCALATE edges to users without privileged directory roles.
severity: medium
order: 60
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName = 'Password Administrator'
     OR rd.templateId = '966707d0-3269-4727-9be2-8c3a10f19b9d'
  SET attacker._canEscalate = true
  WITH attacker, perm
  MATCH (target:User)
  WHERE target <> attacker
    AND NOT EXISTS {
      MATCH (target)-[:HAS_PERMISSION]->(adminRd:RoleDefinition)
      WHERE NOT adminRd.templateId IN [
        '88d8e3e3-8f55-4a1e-953a-9b9898b8876b',
        '95e79109-95c0-4d8e-aee3-d01accf2d47b',
        '966707d0-3269-4727-9be2-8c3a10f19b9d'
      ]
    }
  WITH DISTINCT attacker, target, perm
  MERGE (attacker)-[r:CAN_ESCALATE {method: 'PasswordResetViaPasswordAdmin'}]->(target)
  ON CREATE SET
    r.condition = 'Can reset passwords for users with no admin roles or specific low-privilege roles',
    r.category = 'DirectoryRole',
    r.source = perm.source
  RETURN count(r) AS created
