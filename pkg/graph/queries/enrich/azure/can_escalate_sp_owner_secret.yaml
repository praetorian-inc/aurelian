id: azure/enrich/can-escalate-sp-owner-secret
name: Service Principal Owner Secret Injection Escalation
platform: azure
type: enrich
category: escalation
description: |
  Service principal owners can add client secrets and modify SP configuration.
  Creates CAN_ESCALATE edges from SP owners to the owned service principal.
severity: critical
order: 91
cypher: |
  MATCH (owner)-[:OWNS]->(sp:ServicePrincipal)
  WITH DISTINCT owner, sp
  MERGE (owner)-[r:CAN_ESCALATE {method: 'ServicePrincipalAddSecret'}]->(sp)
  ON CREATE SET
    r.condition = 'Service Principal owner can add client secrets and modify SP configuration',
    r.category = 'ApplicationOwnership'
  RETURN count(r) AS created
