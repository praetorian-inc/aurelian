id: azure/enrich/can-escalate-global-admin
name: Global Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Global Administrators have full control over all Azure AD and Azure resources.
  Creates CAN_ESCALATE edges from principals with Global Administrator role
  to all other principals, as they can reset passwords, modify roles, and
  compromise any identity in the directory.
severity: critical
order: 50
cypher: |
  MATCH (principal)-[r:HAS_ROLE]->(roleDef:RoleDefinition)
  WHERE roleDef.displayName = 'Global Administrator'
     OR roleDef.templateId = '62e90394-69f5-4237-9190-012177145e10'
  SET principal._isGlobalAdmin = true, principal._canEscalate = true
  RETURN count(principal) AS globalAdmins
