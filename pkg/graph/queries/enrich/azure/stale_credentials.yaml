id: azure/enrich/stale-credentials
name: Stale Application Credentials
platform: azure
type: enrich
category: hygiene
description: |
  Identifies applications with credentials that have expired or will expire
  within 30 days. Stale credentials may indicate abandoned applications
  that still have privileged access.
severity: medium
order: 30
cypher: |
  MATCH (app:Application)
  WHERE app.credentials IS NOT NULL
  SET app._enriched = true
  RETURN app.id AS appId, app.displayName AS appName
