id: azure/enrich/can-escalate-rbac-user-access-admin
name: Azure RBAC User Access Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  User Access Administrator can assign any Azure role within scope to any
  principal, enabling privilege escalation over all resources in scope.
severity: critical
order: 81
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION {source: 'Azure RBAC'}]->(scope)
  WHERE perm.roleDefinitionId CONTAINS '18d7d88d-d35e-4fb5-a5c3-7773c20a72d9'
  SET attacker._canEscalate = true
  WITH DISTINCT attacker, scope, perm
  OPTIONAL MATCH (scope)-[:CONTAINS*0..3]->(target)
  WHERE target <> attacker AND target IS NOT NULL
  WITH attacker, coalesce(target, scope) AS escalateTarget, perm
  MERGE (attacker)-[r:CAN_ESCALATE {method: 'UserAccessAdmin'}]->(escalateTarget)
  ON CREATE SET
    r.condition = 'User Access Administrator can assign any Azure role within scope to compromise identities',
    r.category = 'RBAC',
    r.source = perm.source
  RETURN count(r) AS created
