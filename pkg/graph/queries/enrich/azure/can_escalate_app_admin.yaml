id: azure/enrich/can-escalate-app-admin
name: Application Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Application Administrators and Cloud Application Administrators can create
  and manage application registrations and service principals, potentially
  adding credentials to privileged apps for escalation.
severity: high
order: 52
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName IN ['Application Administrator', 'Cloud Application Administrator']
     OR rd.templateId IN ['9b895d92-2cd3-44c7-9d02-a6ac2d5ea5c3', '158c047a-c907-4556-b7ef-446551a6b5f7']
  SET attacker._canEscalateViaAppCreds = true, attacker._canEscalate = true
  WITH attacker, perm
  MATCH (target)
  WHERE (target:Application OR target:ServicePrincipal)
    AND target <> attacker
  WITH DISTINCT attacker, target, perm
  MERGE (attacker)-[r:CAN_ESCALATE {method: 'ApplicationAdmin'}]->(target)
  ON CREATE SET
    r.condition = 'Application Administrator can add credentials to applications/service principals to assume their identity and inherit permissions',
    r.category = 'DirectoryRole',
    r.source = perm.source
  RETURN count(r) AS created
