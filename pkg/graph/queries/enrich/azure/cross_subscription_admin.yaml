id: azure/enrich/cross-subscription-admin
name: Cross-Subscription Administrative Access
platform: azure
type: enrich
category: privesc
description: |
  Identifies principals with Owner or Contributor role across multiple
  Azure subscriptions, indicating broad administrative access.
severity: high
order: 25
cypher: |
  MATCH (p:Principal)-[r:HAS_RBAC_ROLE]->(sub:Subscription)
  WHERE r.roleDefinitionId CONTAINS 'Owner' OR r.roleDefinitionId CONTAINS 'Contributor'
  WITH p, count(DISTINCT sub) AS subCount
  WHERE subCount > 1
  SET p._crossSubAdmin = true, p._adminSubCount = subCount
  RETURN p.id AS principalId, subCount
