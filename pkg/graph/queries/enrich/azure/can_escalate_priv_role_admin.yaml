id: azure/enrich/can-escalate-priv-role-admin
name: Privileged Role Administrator Escalation
platform: azure
type: enrich
category: escalation
description: |
  Privileged Role Administrators can assign any Azure AD role to any user,
  including Global Administrator. Creates CAN_ESCALATE edges to all principals.
severity: critical
order: 51
cypher: |
  MATCH (attacker)-[perm:HAS_PERMISSION]->(rd:RoleDefinition)
  WHERE rd.displayName = 'Privileged Role Administrator'
     OR rd.templateId = 'e8611ab8-c189-46e8-94e1-60213ab1f814'
  SET attacker._canEscalateViaRoleAssignment = true, attacker._canEscalate = true
  WITH attacker, perm
  MATCH (target:Principal)
  WHERE target <> attacker
  WITH DISTINCT attacker, target, perm
  CALL {
    WITH attacker, target, perm
    MERGE (attacker)-[r:CAN_ESCALATE {method: 'PrivilegedRoleAdmin'}]->(target)
    ON CREATE SET
      r.condition = 'Privileged Role Administrator can assign Global Administrator or any other directory role to any principal',
      r.category = 'DirectoryRole',
      r.source = perm.source
  } IN TRANSACTIONS OF 10000 ROWS
  RETURN count(*) AS created
