id: azure/enrich/can-escalate-graph-user-write
name: Graph API User.ReadWrite.All Escalation
platform: azure
type: enrich
category: escalation
description: |
  Service principals with User.ReadWrite.All can reset passwords, modify
  profiles, and disable accounts for any user.
severity: high
order: 73
cypher: |
  MATCH (attacker:ServicePrincipal)-[perm:HAS_PERMISSION {source: 'Microsoft Graph App Role'}]->(resource:ServicePrincipal)
  WHERE resource.displayName = 'Microsoft Graph' OR resource.appId = '00000003-0000-0000-c000-000000000000'
  SET attacker._canEscalate = true
  WITH attacker
  MATCH (target:User)
  WHERE target <> attacker
  WITH DISTINCT attacker, target
  CALL {
    WITH attacker, target
    MERGE (attacker)-[r:CAN_ESCALATE {method: 'GraphUserReadWrite'}]->(target)
    ON CREATE SET
      r.condition = 'Service Principal with User.ReadWrite.All can reset passwords, modify profiles, and disable accounts for any user',
      r.category = 'GraphPermission'
  } IN TRANSACTIONS OF 10000 ROWS
  RETURN count(*) AS created
