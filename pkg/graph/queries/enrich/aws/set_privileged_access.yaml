id: aws/enrich/set_privileged_access
name: Flag High-Privilege Principals
platform: aws
type: enrich
category: admin-detection
description: |
  Flags principals with high-privilege actions (PassRole, CreatePolicy, etc.)
severity: medium
order: 12
cypher: |
  MATCH (p:Principal)-[perm]->(resource)
  WHERE type(perm) IN ['IAM_PASSROLE', 'IAM_CREATEPOLICY', 'IAM_CREATEPOLICYVERSION',
    'IAM_ATTACHROLEPOLICY', 'IAM_ATTACHUSERPOLICY', 'IAM_ATTACHGROUPPOLICY',
    'IAM_PUTROLEPOLICY', 'IAM_PUTUSERPOLICY', 'IAM_PUTGROUPPOLICY',
    'STS_ASSUMEROLE', 'IAM_CREATEUSER', 'IAM_CREATEROLE']
  SET p._is_privileged = true
  RETURN count(DISTINCT p) as privileged_principals
