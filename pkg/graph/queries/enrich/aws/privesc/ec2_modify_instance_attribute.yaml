id: aws/enrich/privesc/ec2_modify_instance_attribute
name: EC2 ModifyInstanceAttribute + StopInstances + StartInstances Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ec2:ModifyInstanceAttribute, ec2:StopInstances, and
  ec2:StartInstances that can inject malicious userData into an existing EC2 instance
  with a privileged role, then stop/start it to execute the script and extract
  credentials via IMDS on restart.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[modify]->(target)
  WHERE type(modify) = 'EC2_MODIFYINSTANCEATTRIBUTE'
  WITH attacker, target
  MATCH (attacker)-[stop]->(target)
  WHERE type(stop) = 'EC2_STOPINSTANCES'
  WITH attacker, target
  MATCH (attacker)-[start]->(target)
  WHERE type(start) = 'EC2_STARTINSTANCES'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ec2:ModifyInstanceAttribute + ec2:StopInstances + ec2:StartInstances',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
