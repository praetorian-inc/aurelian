id: aws/enrich/privesc/method_06
name: IAM AttachUserPolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:AttachUserPolicy permission that can attach 
  managed policies to IAM users.
severity: high
order: 106
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_ATTACHUSERPOLICY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'iam:AttachUserPolicy',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
