id: aws/enrich/privesc/method_31
name: CloudFormation CreateChangeSet + ExecuteChangeSet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with cloudformation:CreateChangeSet and cloudformation:ExecuteChangeSet
  that can inherit admin permissions from an existing CloudFormation stack's service role
  — no iam:PassRole required since the role is already attached to the stack.
severity: high
order: 131
cypher: |
  MATCH (attacker:Principal)-[create]->(target)
  WHERE type(create) = 'CLOUDFORMATION_CREATECHANGESET'
  WITH attacker, target
  MATCH (attacker)-[execute]->(target)
  WHERE type(execute) = 'CLOUDFORMATION_EXECUTECHANGESET'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'cloudformation:CreateChangeSet + cloudformation:ExecuteChangeSet',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
