id: aws/enrich/privesc/method_81
name: IAM PassRole + Glue UpdateJob + StartJobRun Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, glue:UpdateJob, and glue:StartJobRun that can
  update an existing Glue job to use a privileged service role and execute it to
  escalate privileges. Both update and execute permissions are required to complete
  the attack path.
severity: high
order: 181
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[update]->(svc)
  WHERE type(update) = 'GLUE_UPDATEJOB'
  WITH attacker, svc
  MATCH (attacker)-[run]->(svc)
  WHERE type(run) = 'GLUE_STARTJOBRUN'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:UpdateJob + glue:StartJobRun',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
