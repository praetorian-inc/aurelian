id: aws/enrich/privesc/method_47
name: IAM PassRole + Amazon Braket Hybrid Job Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and braket:CreateJob permissions
  that can launch an Amazon Braket Hybrid Job with a privileged IAM role and
  execute a malicious Python script to escalate privileges.
severity: high
order: 147
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'BRAKET_CREATEJOB'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + braket:CreateJob',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
