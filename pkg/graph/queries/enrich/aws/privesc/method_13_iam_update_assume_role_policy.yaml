id: aws/enrich/privesc/method_13
name: IAM UpdateAssumeRolePolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:UpdateAssumeRolePolicy permission that can modify 
  the trust policy to allow themselves to assume the role.
severity: high
order: 113
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_UPDATEASSUMEROLEPOLICY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'iam:UpdateAssumeRolePolicy',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
