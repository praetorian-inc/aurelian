id: aws/enrich/privesc/batch_passrole
name: IAM PassRole + AWS Batch Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, batch:RegisterJobDefinition AND batch:SubmitJob
  that can register a Batch job definition carrying a privileged IAM job role, then submit
  a job overriding the container command to steal that role's credentials. The escalation
  target is the PASSED ROLE (not the Batch service resource). Guards: the role must trust
  the ECS task service principal (ecs-tasks.amazonaws.com — Batch tasks run on ECS), must
  live in the attacker's account, and must be more privileged than the attacker. The
  registered definition is inert without SubmitJob, so SubmitJob is required.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (per FP catalog / method_45):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ecs-tasks trust: 'ecs-tasks.amazonaws.com' IN victim.trusted_services (Batch->ECS).
  //   - missing-permission combo: require batch:SubmitJob too (RegisterJobDefinition alone
  //     is inert), expressed via EXISTS so it need not target the same node.
  //   - same-account: PassRole is account-local.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ecs-tasks.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND split(coalesce(victim.Arn, victim.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[reg]->() WHERE type(reg) = 'BATCH_REGISTERJOBDEFINITION' }
    AND EXISTS { (attacker)-[sub]->() WHERE type(sub) = 'BATCH_SUBMITJOB' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + batch:RegisterJobDefinition + batch:SubmitJob'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
