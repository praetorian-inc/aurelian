id: aws/enrich/privesc/method_23
name: SSM SendCommand Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ssm:SendCommand permission that can execute commands 
  on EC2 instances with elevated IAM roles.
severity: high
order: 123
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'SSM_SENDCOMMAND'
  AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ssm:SendCommand',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
