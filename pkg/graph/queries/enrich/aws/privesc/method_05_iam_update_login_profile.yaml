id: aws/enrich/privesc/method_05
name: IAM UpdateLoginProfile Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:UpdateLoginProfile permission that can reset 
  console passwords for other IAM users.
severity: high
order: 105
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_UPDATELOGINPROFILE'
  AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:UpdateLoginProfile',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
