id: aws/enrich/privesc/method_16
name: IAM PassRole + CloudFormation Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and cloudformation:CreateStack permissions 
  that can deploy stacks with elevated IAM roles.
severity: high
order: 116
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'CLOUDFORMATION_CREATESTACK'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + cloudformation:CreateStack',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
