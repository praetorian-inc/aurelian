id: aws/enrich/privesc/method_02
name: IAM SetDefaultPolicyVersion Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:SetDefaultPolicyVersion permission that can 
  activate previous policy versions to gain elevated access.
severity: high
order: 102
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_SETDEFAULTPOLICYVERSION'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'iam:SetDefaultPolicyVersion',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
