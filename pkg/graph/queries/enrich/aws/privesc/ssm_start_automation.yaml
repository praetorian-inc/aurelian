id: aws/enrich/privesc/ssm_start_automation
name: IAM PassRole + SSM StartAutomationExecution Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ssm:StartAutomationExecution
  permissions that can create a custom SSM Automation document with a Python
  aws:executeScript step and execute it with an admin role as the automation
  AssumeRole to escalate privileges.
severity: high
order: 100
cypher: |
  // New-passrole (B-cat 3): target = passed role used as the Automation AssumeRole.
  // SSM Automation assumes the AutomationAssumeRole (trusts ssm.amazonaws.com) to run the
  // aws:executeScript step; the privileged credentials belong to that passed role.
  // Guards (per FP catalog / new-passrole template):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - same-account: iam:PassRole is account-local, so attacker & passed-role accounts
  //     (5th ':'-field of the ARN) must match (per FP catalog rows 18, 605).
  //   - ssm trust: 'ssm.amazonaws.com' IN victim.trusted_services.
  //   - StartAutomationExecution held by the same attacker (EXISTS, not a fan-out join).
  //   - privileged-target suppression (lateral => drop).
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND split(coalesce(attacker.Arn, attacker.arn), ':')[4] = split(coalesce(victim.Arn, victim.arn), ':')[4]
    AND 'ssm.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[start]->() WHERE type(start) = 'SSM_STARTAUTOMATIONEXECUTION' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + ssm:StartAutomationExecution'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
