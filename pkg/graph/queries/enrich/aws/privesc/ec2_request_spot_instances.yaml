id: aws/enrich/privesc/ec2_request_spot_instances
name: IAM PassRole + EC2 RequestSpotInstances Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ec2:RequestSpotInstances that can launch
  a spot instance carrying a privileged IAM role and steal its credentials via IMDS.
  RequestSpotInstances is a distinct IAM action from RunInstances. The escalation target
  is the PASSED ROLE (not the EC2 service resource). Guards: the role must trust
  ec2.amazonaws.com, must have an instance profile, must not be a service-linked role,
  and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole (catalog 121-124): target = passed role. Guards:
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ec2 trust: 'ec2.amazonaws.com' IN victim.trusted_services.
  //   - instance profile present: InstanceProfileList is a JSON string -> CONTAINS arn.
  //   - exclude service-linked roles (cannot be attached to a launch spec).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ec2.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND coalesce(victim.InstanceProfileList, '') CONTAINS 'arn:aws:iam'
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[spot]->() WHERE type(spot) = 'EC2_REQUESTSPOTINSTANCES' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + ec2:RequestSpotInstances',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
