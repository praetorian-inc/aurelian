id: aws/enrich/privesc/method_38
name: IAM PassRole + AutoScaling LaunchTemplate Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, ec2:CreateLaunchTemplate, and
  autoscaling:CreateAutoScalingGroup permissions that can launch instances
  with elevated IAM roles via auto scaling groups.
severity: high
order: 138
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'EC2_CREATELAUNCHTEMPLATE'
  WITH attacker, service_resource
  MATCH (attacker)-[asg]->(asg_resource)
  WHERE type(asg) = 'AUTOSCALING_CREATEAUTOSCALINGGROUP'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + ec2:CreateLaunchTemplate + autoscaling:CreateAutoScalingGroup',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
