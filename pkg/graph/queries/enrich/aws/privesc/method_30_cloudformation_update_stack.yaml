id: aws/enrich/privesc/method_30
name: CloudFormation UpdateStack Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with cloudformation:UpdateStack that can modify an existing
  stack's template to create privileged IAM resources using the stack's already-attached
  service role — no iam:PassRole required since the role was passed at stack creation.
severity: high
order: 130
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'CLOUDFORMATION_UPDATESTACK'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'cloudformation:UpdateStack',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
