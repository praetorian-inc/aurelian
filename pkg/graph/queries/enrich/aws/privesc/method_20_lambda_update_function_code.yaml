id: aws/enrich/privesc/method_20
name: Lambda UpdateFunctionCode Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with lambda:UpdateFunctionCode permission that can modify 
  Lambda function code to execute with the function's IAM role.
severity: high
order: 120
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'LAMBDA_UPDATEFUNCTIONCODE'
  AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'lambda:UpdateFunctionCode',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
