id: aws/enrich/privesc/method_80
name: IAM PassRole + Glue CreateJob + StartJobRun Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, glue:CreateJob, and glue:StartJobRun that can
  create a Glue job with a privileged service role and immediately execute it to
  escalate privileges. Both create and execute permissions are required to complete
  the attack path.
severity: high
order: 180
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(svc)
  WHERE type(create) = 'GLUE_CREATEJOB'
  WITH attacker, svc
  MATCH (attacker)-[run]->(svc2)
  WHERE type(run) = 'GLUE_STARTJOBRUN'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(svc)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:CreateJob + glue:StartJobRun',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
