id: aws/enrich/privesc/sts_assume_role
name: STS AssumeRole Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals that can assume a role whose trust policy actually names them.
  Gated on the STS_ASSUMEROLE base edge, which the IAM evaluator emits when the
  assumption actually resolves: either the attacker's identity policy grants
  sts:AssumeRole AND the role's trust allows the attacker (identity-grant + trust), OR
  the role's trust DIRECTLY names the attacker's exact ARN in a granting statement
  (exact-ARN direct trust, which AWS permits with no identity grant). Both are validated
  together, so no separate trust-only edge is needed. Trust-backed direct takeover is the finding, so this
  fails-OPEN on target privilege (still emits to a sparse role whose
  _is_admin/_is_privileged are unknown), but the severity is tiered: admin target ->
  high, privileged target -> medium, and an unknown-sparse OR known-non-privileged
  target -> low (a lateral takeover, not high).
severity: high
order: 100
cypher: |
  // Trust-aware (B.7): the victim is the role the attacker can actually assume. The
  // STS_ASSUMEROLE base edge already encodes a resolved assumption (the evaluator emits
  // it when identity grants sts:AssumeRole AND trust allows, OR when trust DIRECTLY names
  // the attacker's exact ARN in a granting statement), so we join the validated edge
  // directly to THE victim rather than gating on a separate trust-only edge plus a loose
  // any-target permission check.
  // Guards: admin-as-source exclusion; self-target exclusion.
  // Tiering (fail-open): admin -> high, privileged -> medium, unknown/non-privileged -> low.
  MATCH (attacker:Principal)-[:STS_ASSUMEROLE]->(victim:Principal)
  WHERE coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'sts:AssumeRole'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        WHEN coalesce(victim._is_privileged, false) = true THEN 'medium'
        ELSE 'low'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
