id: aws/enrich/privesc/iam_create_service_linked_role
name: IAM CreateServiceLinkedRole Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  iam:CreateServiceLinkedRole has NO usable privilege-escalation path that the graph can
  model, so this enricher intentionally emits NO CAN_PRIVESC edges. A service-linked role
  always lives under the /aws-service-role/ path, is created with a fixed AWS-managed
  policy the creator cannot edit, trusts ONLY its owning service, and cannot be assumed by
  a user — the creator gains no credentials and no assumable identity. The created role
  also does not exist at scan time, so there is no node to evaluate or point an edge at.

  The original all-principals fan-out (drawing CAN_PRIVESC to every other principal) was a
  pure false positive and is removed. This is therefore an explicit no-op rather than a
  guarded self-loop: there is no graph state under which this technique is a real
  escalation. A future enricher that projects each AWS service's SLR template and flags
  the resulting managed policy as admin/privileged would be required before any edge could
  legitimately be emitted; until then this method deliberately matches nothing.
severity: medium
order: 100
cypher: |
  // Explicit no-op: iam:CreateServiceLinkedRole has no modelable escalation in the graph.
  // An SLR is always on the /aws-service-role/ path, carries a fixed AWS-managed policy,
  // trusts only its owning service, and is unassumable by users — so creating one yields
  // no credentials and no assumable identity, and the created role isn't even a node yet.
  // We keep the permission MATCH (so the method's intent is documented and the relationship
  // type stays referenced) but draw NO edge. The prior all-principals fan-out was a pure
  // false positive and is intentionally removed. No CAN_PRIVESC edge is ever created here.
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_CREATESERVICELINKEDROLE'
    AND coalesce(attacker._is_admin, false) <> true
  // No MERGE / no CAN_PRIVESC edge: this technique is not an escalation in any graph state.
  RETURN 0 as edges_created
