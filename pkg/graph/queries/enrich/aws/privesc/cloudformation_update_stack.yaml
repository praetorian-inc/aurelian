id: aws/enrich/privesc/cloudformation_update_stack
name: CloudFormation UpdateStack Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with cloudformation:UpdateStack that can rewrite an existing stack's
  template to create privileged IAM resources using the stack's already-attached service
  role — no iam:PassRole required since the role was passed at stack creation. The
  escalation target is the stack's SERVICE ROLE (reached via the resource_service_role
  enricher's HAS_ROLE edge from AWS::CloudFormation::Stack), not an arbitrary principal.
  A stack with no service role uses the caller's own credentials and confers no
  escalation, so the HAS_ROLE link is mandatory (fail-closed). Guards: target role must
  be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // Existing-resource takeover (D / method_30): drop the all-principals fan-out. The
  // victim is the privileged service role bound to a stack the attacker can update,
  // reached via (Stack)-[:HAS_ROLE]->(role). HAS_ROLE is mandatory (fail-closed):
  // a roleless stack runs as the caller, conferring nothing.
  // Guards: admin-as-source exclusion; self-target exclusion; privileged-target tiering.
  MATCH (attacker:Principal)-[perm]->()
  WHERE type(perm) = 'CLOUDFORMATION_UPDATESTACK'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (stack:Resource)-[:HAS_ROLE]->(victim:Principal)
  WHERE stack._resourceType = 'AWS::CloudFormation::Stack'
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'cloudformation:UpdateStack',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
