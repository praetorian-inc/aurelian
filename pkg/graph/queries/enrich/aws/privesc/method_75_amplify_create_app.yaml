id: aws/enrich/privesc/method_75
name: IAM PassRole + Amplify CreateApp + CreateBranch + StartJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, amplify:CreateApp, amplify:CreateBranch, and
  amplify:StartJob that can create an Amplify app connected to a repository containing
  a malicious amplify.yml build spec that executes with the passed IAM role.
severity: high
order: 175
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[app]->(svc)
  WHERE type(app) = 'AMPLIFY_CREATEAPP'
  WITH attacker, victim, svc
  MATCH (attacker)-[branch]->(svc)
  WHERE type(branch) = 'AMPLIFY_CREATEBRANCH'
  WITH attacker, victim, svc
  MATCH (attacker)-[job]->(svc)
  WHERE type(job) = 'AMPLIFY_STARTJOB'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + amplify:CreateApp + amplify:CreateBranch + amplify:StartJob',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
