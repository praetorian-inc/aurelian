id: aws/enrich/privesc/cloudformation_changeset
name: CloudFormation CreateChangeSet + ExecuteChangeSet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with cloudformation:CreateChangeSet and cloudformation:ExecuteChangeSet
  on the SAME stack that can inherit admin permissions from that stack's service role —
  no iam:PassRole required since the role is already attached to the stack.

  NOTE (fan-out): the privesc target is the matched stack stub, NOT the stack's service
  role, because the stack -> service-role binding requires a stack->role enricher
  (CloudControl AWS::CloudFormation::Stack RoleARN -> HAS_ROLE Role) that is NOT yet in
  the graph. That enricher is deferred to fan-out; once it lands, re-point the edge at
  the stack's HAS_ROLE role and add the privileged-target guard on it. Until then the
  cartesian all-principals fan-out is removed (the dominant FP) and only the
  admin-as-source guard is applied; target tiering is fail-open on the sparse stub.
severity: high
order: 100
cypher: |
  // Multi-perm: both change-set actions must resolve to the SAME stack stub (no fan-out).
  // Guard: admin-as-source exclusion. Stack->role binding deferred to a fan-out enricher.
  MATCH (attacker:Principal)-[create]->(target)
  WHERE type(create) = 'CLOUDFORMATION_CREATECHANGESET'
    AND coalesce(attacker._is_admin, false) <> true
  WITH attacker, target
  MATCH (attacker)-[execute]->(target)
  WHERE type(execute) = 'CLOUDFORMATION_EXECUTECHANGESET'
    AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  WITH DISTINCT attacker, target
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'cloudformation:CreateChangeSet + cloudformation:ExecuteChangeSet'}]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
