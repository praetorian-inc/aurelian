id: aws/enrich/privesc/method_43
name: IAM PassRole + App Runner CreateService Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and apprunner:CreateService permissions
  that can deploy an App Runner service with a privileged IAM role and extract
  credentials via the container runtime metadata endpoint.
severity: high
order: 143
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'APPRUNNER_CREATESERVICE'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + apprunner:CreateService',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
