id: aws/enrich/privesc/method_85
name: IAM PassRole + EMR Serverless CreateApplication + StartJobRun Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, emr-serverless:CreateApplication, and
  emr-serverless:StartJobRun that can create an EMR Serverless application with an admin
  execution role and immediately run a job to escalate privileges. Both create and run
  permissions are required to complete the attack path.
severity: high
order: 185
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[create]->(svc)
  WHERE type(create) = 'EMR-SERVERLESS_CREATEAPPLICATION'
  WITH attacker, victim, svc
  MATCH (attacker)-[run]->(svc)
  WHERE type(run) = 'EMR-SERVERLESS_STARTJOBRUN'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + emr-serverless:CreateApplication + emr-serverless:StartJobRun',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
