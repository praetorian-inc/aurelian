id: aws/enrich/privesc/emr_run_job_flow
name: IAM PassRole + EMR RunJobFlow Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and elasticmapreduce:RunJobFlow that can
  launch an EMR cluster carrying a privileged EC2 instance role and execute a step to
  steal its credentials via IMDS. The escalation target is the PASSED EC2 instance role
  (not the EMR service resource). Guards: the role must trust ec2.amazonaws.com (EMR
  cluster nodes are EC2 instances), must have an instance profile, and must be more
  privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed EMR EC2 instance role. Guards (new-passrole template):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - service-linked-role exclusion (':role/aws-service-role/'): SLRs are AWS-owned and
  //     cannot be passed as an EMR instance role, matching the other EC2/instance methods.
  //   - ec2 trust: 'ec2.amazonaws.com' IN victim.trusted_services (EMR nodes are EC2).
  //   - instance profile present: InstanceProfileList is a JSON string -> CONTAINS arn.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND 'ec2.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND coalesce(victim.InstanceProfileList, '') CONTAINS 'arn:aws:iam'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[run]->(service_resource)
  WHERE type(run) = 'ELASTICMAPREDUCE_RUNJOBFLOW'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + elasticmapreduce:RunJobFlow',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
