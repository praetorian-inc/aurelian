id: aws/enrich/privesc/codestar_create_project
name: CodeStar CreateProject Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with codestar:CreateProject that can provision a CodeStar project
  whose toolchain CloudFormation stack creates privileged IAM roles for the CI/CD
  pipeline, inheriting their permissions. The all-principals fan-out (the dominant FP) is
  removed: CreateProject cannot reach arbitrary existing principals, only the roles the
  project's own toolchain template would create.

  NOTE (no HAS_ROLE / no resource link): CodeStar projects are not modeled as a resource
  type by either resource-to-role enricher (no AWS::CodeStar::Project in the HAS_ROLE
  scope) and CodeStar has no service-trust principal to key a passed-role guard on, so
  there is no graph target for the escalation. The permission target is constrained to
  :Principal so the method only merges CAN_PRIVESC to an actual principal — never to a
  resource/service stub the permission edge happens to point at; codestar:CreateProject
  resolves to the CodeStar service wildcard (a :Resource), so with no Principal target
  this method emits no edge until a CodeStar resource->role enricher lands and the
  CAN_PRIVESC edge can be re-pointed at the toolchain role.
severity: medium
order: 100
cypher: |
  // No-resource-link (terminate at the permission target; drop the all-principals fan-out).
  // Constrain the target to :Principal so a non-Principal stub (CodeStar service wildcard)
  // never receives a bogus CAN_PRIVESC. Guards: admin-as-source exclusion; self-target
  // exclusion. Target privilege fail-open (no HAS_ROLE / no service-trust target for CodeStar).
  MATCH (attacker:Principal)-[perm]->(target:Principal)
  WHERE type(perm) = 'CODESTAR_CREATEPROJECT'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(target.Arn, target.arn, '') <> coalesce(attacker.Arn, attacker.arn, '')
  WITH DISTINCT attacker, target
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'codestar:CreateProject',
      pe.severity = 'medium',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
