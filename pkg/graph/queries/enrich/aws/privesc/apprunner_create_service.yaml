id: aws/enrich/privesc/apprunner_create_service
name: IAM PassRole + App Runner CreateService Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and apprunner:CreateService that can deploy
  an App Runner service carrying a privileged IAM instance role and steal its credentials
  via the container runtime metadata endpoint. The escalation target is the PASSED ROLE
  (not the App Runner service resource). Guards: the role must trust App Runner
  (tasks.apprunner.amazonaws.com), must not be a service-linked role, must live in the
  attacker's account, and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (per FP catalog / method_43):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - App Runner trust: 'tasks.apprunner.amazonaws.com' IN victim.trusted_services.
  //   - service-linked-role exclusion (aws-service-role path is not attacker-controllable).
  //   - same-account: PassRole is account-local (role's account segment must match attacker).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'tasks.apprunner.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND split(coalesce(victim.Arn, victim.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'APPRUNNER_CREATESERVICE'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + apprunner:CreateService'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
