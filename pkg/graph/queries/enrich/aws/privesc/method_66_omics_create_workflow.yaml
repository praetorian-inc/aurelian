id: aws/enrich/privesc/method_66
name: IAM PassRole + AWS HealthOmics Workflow Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and omics:CreateWorkflow permissions
  that can create an AWS HealthOmics WDL workflow with an admin execution role
  whose task exfiltrates credentials to S3, enabling privilege escalation.
severity: high
order: 166
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'OMICS_CREATEWORKFLOW'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + omics:CreateWorkflow',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
