id: aws/enrich/privesc/passrole_modify_policy
name: PassRole + Policy Modification Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals that can write an admin policy onto a role (iam:PutRolePolicy or
  iam:AttachRolePolicy) AND pass that SAME role to a service that runs it (iam:PassRole),
  executing under the now-privileged role. The escalation target is the modified role.
  Because the attacker grants the privilege via the policy write, the role BECOMES
  privileged, so a privileged-target guard is intentionally NOT applied (it would suppress
  true positives). A usable assumption path is required so the granted privilege is
  reachable: the role must EITHER be directly assumable by the attacker (CAN_ASSUME) OR
  trust a consuming service the attacker passes it to (the role has at least one trusted
  service principal). Guards: admin-as-source and self-target exclusion, Role-only target
  scoping, and exclusion of service-linked roles (policy writes are blocked on SLRs).
severity: high
order: 100
cypher: |
  // Multi-perm on one target role (per FP catalog method_11 / 287-291 / 261-262 / 288):
  //   - both the policy-modify action AND PassRole must resolve to the SAME role node.
  //   - admin-as-source exclusion; self-target exclusion (casing-safe coalesce).
  //   - require the :Role label (Put/AttachRolePolicy only apply to roles).
  //   - exclude service-linked roles (policy writes blocked on SLRs).
  //   - require a usable assumption path so the granted privilege is reachable: a direct
  //     CAN_ASSUME trust edge, OR a consuming service to pass the role to (trusted_services
  //     non-empty). PassRole to a role no service can run is not escalation.
  //   - do NOT apply privileged-target guard: the attacker writes the privilege in.
  MATCH (attacker:Principal)-[modify]->(target:Role)
  WHERE type(modify) IN ['IAM_PUTROLEPOLICY', 'IAM_ATTACHROLEPOLICY']
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND NOT coalesce(target.Arn, target.arn) CONTAINS ':role/aws-service-role/'
    AND EXISTS { (attacker)-[pr]->(target) WHERE type(pr) = 'IAM_PASSROLE' }
    AND (
      EXISTS { (attacker)-[:CAN_ASSUME]->(target) }
      OR size(coalesce(target.trusted_services, [])) > 0
    )
  WITH DISTINCT attacker, target
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + policy modification'}]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
