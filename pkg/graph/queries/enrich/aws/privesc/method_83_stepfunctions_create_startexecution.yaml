id: aws/enrich/privesc/method_83
name: IAM PassRole + Step Functions CreateStateMachine + StartExecution Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, states:CreateStateMachine, and states:StartExecution
  that can create a Step Functions state machine with an admin role that calls IAM APIs
  via SDK service integration and immediately execute it. Both create and start permissions
  are required to complete the attack path.
severity: high
order: 183
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(svc)
  WHERE type(create) = 'STATES_CREATESTATEMACHINE'
  WITH attacker, svc
  MATCH (attacker)-[start]->(svc)
  WHERE type(start) = 'STATES_STARTEXECUTION'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + states:CreateStateMachine + states:StartExecution',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
