id: aws/enrich/privesc/autoscaling_launch_template
name: IAM PassRole + AutoScaling LaunchTemplate Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, ec2:CreateLaunchTemplate, and
  autoscaling:CreateAutoScalingGroup permissions that can launch instances
  with elevated IAM roles via auto scaling groups.
severity: high
order: 100
cypher: |
  // New-passrole + multi-perm (EC2-family launch): target = passed role carried by the
  // launch template into the ASG-launched instance; creds stolen via IMDS. Both the
  // launch-template author and the ASG launcher are required; expressed as EXISTS on the
  // SAME attacker so there is no fan-out to other principals/resources. Guards
  // (cross-cutting / FP catalog lines 132-135, 601):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ec2 trust: 'ec2.amazonaws.com' IN victim.trusted_services (instance assumes role via EC2).
  //   - instance profile present: EC2 attaches roles via instance profiles -> InstanceProfileList CONTAINS arn.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ec2.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND coalesce(victim.InstanceProfileList, '') CONTAINS 'arn:aws:iam'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[create]->() WHERE type(create) = 'EC2_CREATELAUNCHTEMPLATE' }
    AND EXISTS { (attacker)-[asg]->() WHERE type(asg) = 'AUTOSCALING_CREATEAUTOSCALINGGROUP' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + ec2:CreateLaunchTemplate + autoscaling:CreateAutoScalingGroup'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
