id: aws/enrich/privesc/iam_pass_role_glue
name: IAM PassRole + Glue Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and glue:CreateJob permissions 
  that can create Glue jobs with elevated IAM roles.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'GLUE_CREATEJOB'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:CreateJob',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
