id: aws/enrich/privesc/method_08
name: IAM AttachRolePolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:AttachRolePolicy permission that can attach 
  managed policies to IAM roles.
severity: high
order: 108
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_ATTACHROLEPOLICY'
  AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:AttachRolePolicy',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
