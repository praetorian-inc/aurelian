id: aws/enrich/privesc/method_71
name: IAM PassRole + Step Functions UpdateStateMachine Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and states:UpdateStateMachine permissions
  that can replace an existing state machine's definition with malicious IAM API calls
  and execute it with a privileged role to escalate privileges.
severity: high
order: 171
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[update]->(service_resource)
  WHERE type(update) = 'STATES_UPDATESTATEMACHINE'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + states:UpdateStateMachine',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
