id: aws/enrich/privesc/apprunner_update_service
name: App Runner UpdateService Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with apprunner:UpdateService permission that can modify an
  existing App Runner service to execute privilege escalation commands under the
  service's attached IAM role.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'APPRUNNER_UPDATESERVICE'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'apprunner:UpdateService',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
