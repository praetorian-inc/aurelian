id: aws/enrich/privesc/method_45
name: IAM PassRole + AWS Batch Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole and batch:RegisterJobDefinition permissions
  that can create a Batch job definition with a privileged IAM job role and submit
  a job to execute arbitrary commands with elevated privileges.
severity: high
order: 145
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[reg]->(service_resource)
  WHERE type(reg) = 'BATCH_REGISTERJOBDEFINITION'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + batch:RegisterJobDefinition',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
