id: aws/enrich/privesc/method_59
name: IAM PassRole + GameLift CreateFleet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and gamelift:CreateFleet permissions
  that can upload a malicious game server build and create a GameLift fleet with
  an admin instance role to extract credentials via IMDS.
severity: high
order: 159
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'GAMELIFT_CREATEFLEET'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + gamelift:CreateFleet',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
