id: aws/enrich/privesc/method_24
name: SSM StartSession Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ssm:StartSession permission that can start interactive 
  sessions on EC2 instances with elevated IAM roles.
severity: high
order: 124
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'SSM_STARTSESSION'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'ssm:StartSession',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
