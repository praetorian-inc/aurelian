id: aws/enrich/privesc/kinesisanalytics_startapplication
name: IAM PassRole + Kinesis Analytics CreateApplication + StartApplication Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, kinesisanalytics:CreateApplication, and
  kinesisanalytics:StartApplication that can create a Kinesis Analytics (Managed Flink)
  application with an admin execution role and start it to run a malicious JAR that
  escalates privileges. Both create and start permissions are required.
severity: high
order: 100
cypher: |
  // New-passrole + multi-perm: target = passed role (Flink execution role). Both create
  // and start are required; expressed as EXISTS predicates on the SAME attacker so there
  // is no fan-out to other principals/resources. Guards (cross-cutting / FP catalog):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - kinesisanalytics trust: 'kinesisanalytics.amazonaws.com' IN victim.trusted_services.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'kinesisanalytics.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[create]->() WHERE type(create) = 'KINESISANALYTICS_CREATEAPPLICATION' }
    AND EXISTS { (attacker)-[start]->() WHERE type(start) = 'KINESISANALYTICS_STARTAPPLICATION' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + kinesisanalytics:CreateApplication + kinesisanalytics:StartApplication'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
