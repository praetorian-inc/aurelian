id: aws/enrich/privesc/iam_pass_role_sagemaker
name: IAM PassRole + SageMaker Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and sagemaker:CreateNotebookInstance that can
  launch a notebook executing under a privileged role and steal its credentials. The
  escalation target is the PASSED ROLE (not the SageMaker service resource). Guards: the role
  must trust sagemaker.amazonaws.com, must not be service-linked, and must be more privileged
  than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (per FP catalog method_19 / B.1):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - sagemaker trust: 'sagemaker.amazonaws.com' IN victim.trusted_services.
  //   - exclude service-linked roles (cannot be a notebook execution role).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'sagemaker.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'SAGEMAKER_CREATENOTEBOOKINSTANCE'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + sagemaker:CreateNotebookInstance',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
