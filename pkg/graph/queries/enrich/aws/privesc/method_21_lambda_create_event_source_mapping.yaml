id: aws/enrich/privesc/method_21
name: Lambda CreateEventSourceMapping Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with lambda:CreateEventSourceMapping permission that can 
  trigger existing Lambda functions with malicious input.
severity: medium
order: 121
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'LAMBDA_CREATEEVENTSOURCEMAPPING'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'lambda:CreateEventSourceMapping',
      pe.severity = 'medium',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
