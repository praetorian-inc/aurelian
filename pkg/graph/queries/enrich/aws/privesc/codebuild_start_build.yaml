id: aws/enrich/privesc/codebuild_start_build
name: CodeBuild StartBuild Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with codebuild:StartBuild permission that can start builds
  on CodeBuild projects with elevated service roles.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) IN ['CODEBUILD_STARTBUILD', 'CODEBUILD_STARTBUILDBATCH']
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'codebuild:StartBuild',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
