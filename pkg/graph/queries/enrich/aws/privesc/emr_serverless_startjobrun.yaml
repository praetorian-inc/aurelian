id: aws/enrich/privesc/emr_serverless_startjobrun
name: IAM PassRole + EMR Serverless CreateApplication + StartJobRun Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, emr-serverless:CreateApplication, and
  emr-serverless:StartJobRun that can create an EMR Serverless application bound to a
  privileged execution role and immediately run a job under it to escalate privileges. The
  escalation target is the PASSED EXECUTION ROLE (not the EMR Serverless service resource).
  Both emr-serverless actions are required and joined to the same service node. EMR
  Serverless is not EC2-backed, so there is no instance profile; guards require the role to
  trust emr-serverless.amazonaws.com and to be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole (multi-perm): target = passed execution role; CreateApplication +
  // StartJobRun required on the SAME service node. Guards (new-passrole + multi-perm):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - emr-serverless trust: 'emr-serverless.amazonaws.com' IN victim.trusted_services.
  //   - no instance profile guard (EMR Serverless is not EC2-backed).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'emr-serverless.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(svc)
  WHERE type(create) = 'EMR-SERVERLESS_CREATEAPPLICATION'
  WITH DISTINCT attacker, victim, svc
  MATCH (attacker)-[run]->(svc)
  WHERE type(run) = 'EMR-SERVERLESS_STARTJOBRUN'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + emr-serverless:CreateApplication + emr-serverless:StartJobRun'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
