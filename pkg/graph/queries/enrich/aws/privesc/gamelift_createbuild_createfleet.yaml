id: aws/enrich/privesc/gamelift_createbuild_createfleet
name: IAM PassRole + GameLift CreateBuild + CreateFleet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, gamelift:CreateBuild, and gamelift:CreateFleet that
  can upload a malicious game server build and create a GameLift fleet carrying a privileged
  instance role, then steal its credentials via IMDS. The escalation target is the PASSED
  ROLE (not the GameLift service resource). All three actions are required; the two gamelift
  actions act on DIFFERENT resources (a build artifact and a fleet referencing it), so they
  are co-existence checks on the attacker rather than a join on one shared node. Guards: the
  role must trust gamelift.amazonaws.com (the GameLift service ASSUMES the fleet instance
  role via this principal — there is NO EC2 instance profile, so trust alone identifies a
  GameLift fleet role) and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole (multi-perm): target = passed role. CreateBuild and CreateFleet operate on
  // distinct resources (build vs fleet), so they are required as independent co-existence
  // checks on the attacker, not joined to one shared svc node (which would wrongly demand a
  // single resource carrying both actions). The escalation target is still ONLY the passed
  // role, so this introduces no second fan-out. Guards (new-passrole + multi-perm templates):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - gamelift trust: 'gamelift.amazonaws.com' IN victim.trusted_services. This is the sole
  //     resource-type discriminator: a GameLift fleet's instance role is ASSUMED by the
  //     GameLift service (trust principal gamelift.amazonaws.com), NOT attached as an EC2
  //     instance profile, so the role carries NO InstanceProfileList. An instance-profile
  //     guard here wrongly suppressed the real escalation (live admin role: trusts gamelift,
  //     InstanceProfileList = null).
  //   - service-linked-role exclusion (aws-service-role path is not attacker-controllable).
  //   - same-account: PassRole is account-local (role's account segment must match attacker).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'gamelift.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND split(coalesce(victim.Arn, victim.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[build]->() WHERE type(build) = 'GAMELIFT_CREATEBUILD' }
    AND EXISTS { (attacker)-[fleet]->() WHERE type(fleet) = 'GAMELIFT_CREATEFLEET' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + gamelift:CreateBuild + gamelift:CreateFleet'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
