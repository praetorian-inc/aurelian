id: aws/enrich/privesc/bedrock_create_code_interpreter
name: IAM PassRole + Bedrock CreateCodeInterpreter Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole and bedrock-agentcore:CreateCodeInterpreter
  permissions that can deploy a Bedrock AgentCore Code Interpreter resource with a
  privileged IAM role, enabling arbitrary code execution with elevated permissions.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'BEDROCK-AGENTCORE_CREATECODEINTERPRETER'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + bedrock-agentcore:CreateCodeInterpreter',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
