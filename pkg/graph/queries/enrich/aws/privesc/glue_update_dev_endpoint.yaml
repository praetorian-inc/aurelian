id: aws/enrich/privesc/glue_update_dev_endpoint
name: Glue UpdateDevEndpoint Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with glue:UpdateDevEndpoint permission that can modify
  Glue development endpoints to execute arbitrary code with the endpoint's IAM role.
severity: medium
order: 100
cypher: |
  // Existing-compute takeover: UpdateDevEndpoint pushes code/public-key to an EXISTING
  // Glue dev endpoint; it cannot change the endpoint's (immutable) RoleArn. The reachable
  // privilege is bounded by the role the existing dev endpoint RUNS AS, resolved via the
  // (Resource)-[:HAS_ROLE]->(Role) edge from resource_service_role.yaml. Guards
  // (per FP catalog method_29):
  //   - mandatory HAS_ROLE join (fail-closed): no dev endpoint -> no edge, no fan-out.
  //   - admin-as-source exclusion; self-target exclusion (cross-label coalesce).
  //   - privileged-target: suppress non-privileged endpoint roles (lateral); tier
  //     admin -> high, privileged -> medium.
  MATCH (attacker:Principal)-[perm]->()
  WHERE type(perm) = 'GLUE_UPDATEDEVENDPOINT'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (resource:Resource)-[:HAS_ROLE]->(victim:Principal)
  WHERE resource._resourceType = 'AWS::Glue::DevEndpoint'
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'glue:UpdateDevEndpoint'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        WHEN coalesce(victim._is_privileged, false) = true THEN 'medium'
        ELSE 'low'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
