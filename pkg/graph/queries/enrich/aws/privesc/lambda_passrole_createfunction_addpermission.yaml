id: aws/enrich/privesc/lambda_passrole_createfunction_addpermission
name: IAM PassRole + Lambda CreateFunction + AddPermission Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, lambda:CreateFunction, and lambda:AddPermission
  that can create a Lambda function with an admin role and grant themselves invocation
  permission via a resource-based policy without needing lambda:InvokeFunction directly.
severity: high
order: 100
cypher: |
  // New-passrole: target = the PASSED ROLE (a Principal), bound once through the chain.
  // The attacker creates a function under that role and self-grants invoke via the
  // resource policy (AddPermission). Guards (per FP catalog method_79):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - lambda trust: the passed role must trust lambda.amazonaws.com, else CreateFunction
  //     rejects it ('the role cannot be assumed by Lambda').
  //   - exclude service-linked roles (/aws-service-role/): only the owning service can assume.
  //   - privileged-target: a least-privilege passed role is lateral, not escalation.
  //   - same-account: require the passed role's account segment to match the attacker's
  //     (a cross-account IAM_PASSROLE stub cannot actually be passed without a trust path).
  //   - CreateFunction + AddPermission must resolve to the SAME Lambda service resource.
  //   - NOTE: aws:SourceArn/SourceAccount conditions on AddPermission resolve at runtime
  //     and are not on the edge, so a condition-restricted self-grant cannot be pruned here.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND split(coalesce(victim.Arn, victim.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
    AND 'lambda.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH attacker, victim
  MATCH (attacker)-[create]->(svc)
  WHERE type(create) = 'LAMBDA_CREATEFUNCTION'
  WITH attacker, victim, svc
  MATCH (attacker)-[addperm]->(svc)
  WHERE type(addperm) = 'LAMBDA_ADDPERMISSION'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + lambda:CreateFunction + lambda:AddPermission'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
