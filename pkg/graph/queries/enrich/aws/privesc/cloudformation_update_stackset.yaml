id: aws/enrich/privesc/cloudformation_update_stackset
name: CloudFormation UpdateStackSet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with cloudformation:UpdateStackSet that can rewrite an existing
  StackSet's template to create escalated IAM resources using the StackSet's
  already-attached execution role — no iam:PassRole required since the role was passed at
  StackSet creation. The escalation target is the StackSet's EXECUTION ROLE (reached via
  the resource_service_role enricher's HAS_ROLE edge from AWS::CloudFormation::StackSet),
  not an arbitrary principal. UpdateStackSet requires an existing StackSet, so the
  HAS_ROLE link is mandatory (fail-closed). Guards: target role must be more privileged
  than the attacker.

  NOTE (missing-precondition): pushing the updated template to stack instances requires a
  deploy operation against existing instances/OUs, and SERVICE_MANAGED StackSets need
  Organizations trusted access; neither stack-instance inventory nor org trusted-access
  state is in the graph. Left as an engine/data dependency.
severity: high
order: 100
cypher: |
  // Existing-resource takeover (D / method_49): drop the all-principals fan-out and the
  // discarded PassRole victim. The victim is the privileged execution role bound to a
  // StackSet the attacker can update, reached via (StackSet)-[:HAS_ROLE]->(role).
  // HAS_ROLE is mandatory (fail-closed): no StackSet -> nothing to update.
  // Guards: admin-as-source exclusion; self-target exclusion; privileged-target tiering.
  MATCH (attacker:Principal)-[perm]->()
  WHERE type(perm) = 'CLOUDFORMATION_UPDATESTACKSET'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (stackset:Resource)-[:HAS_ROLE]->(victim:Principal)
  WHERE stackset._resourceType = 'AWS::CloudFormation::StackSet'
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'cloudformation:UpdateStackSet'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
