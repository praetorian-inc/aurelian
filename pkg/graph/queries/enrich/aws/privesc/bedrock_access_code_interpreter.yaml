id: aws/enrich/privesc/bedrock_access_code_interpreter
name: Bedrock AgentCore InvokeSession Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with bedrock-agentcore:InvokeSession that can access an EXISTING
  Bedrock code interpreter session carrying a privileged IAM role and extract credentials
  from the MicroVM metadata service (no iam:PassRole required).

  The bedrock-agentcore:InvokeSession permission edge resolves to the AgentCore SERVICE
  wildcard resource (arn:aws:bedrock-agentcore:*:*:*), NOT to a specific interpreter-session
  node, so the graph carries no CodeInterpreter->Role linkage to identify the exact target
  role (no AgentCore resource->role enricher exists; resource_service_role covers
  CFN/CodeBuild/Glue/AppRunner/ECS/StepFunctions/SageMaker/DataPipeline only). The escalation
  edge therefore terminates at the matched AgentCore service resource (NOT at an arbitrary
  Role — that would re-introduce a filtered cartesian fan-out to roles no session uses). The
  trust + privileged-target guards ARE applied, in the only sound form available without the
  link: as an EXISTENCE precondition requiring at least one bedrock-agentcore-trusting,
  privileged Role in the account, so the method is suppressed entirely when no viable target
  role could exist. Severity is tiered by the strongest such candidate role (admin -> high,
  privileged-only -> medium). Once the CodeInterpreter->Role enricher lands, re-point the
  edge at the specific execution role.
severity: high
order: 100
cypher: |
  // Existing-passrole / compute-takeover: InvokeSession hijacks an existing interpreter
  // session's execution role. InvokeSession maps to the AgentCore service wildcard, so
  // there is no per-session role node; the edge terminates at the service resource (no
  // second fan-out MATCH to every Principal). Expressible guards:
  //   - admin-as-source exclusion; self-target exclusion.
  //   - trust + privilege applied as an existence precondition: require >=1
  //     bedrock-agentcore-trusting privileged Role in the account; suppress when none
  //     exists; tier severity by the best.
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'BEDROCK-AGENTCORE_INVOKESESSION'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  WITH DISTINCT attacker, target
  MATCH (execrole:Role)
  WHERE 'bedrock-agentcore.amazonaws.com' IN coalesce(execrole.trusted_services, [])
    AND (coalesce(execrole._is_admin, false) = true OR coalesce(execrole._is_privileged, false) = true)
    AND coalesce(execrole.Arn, execrole.arn) <> coalesce(attacker.Arn, attacker.arn)
  WITH attacker, target,
       max(CASE WHEN coalesce(execrole._is_admin, false) = true THEN 2 ELSE 1 END) AS best_tier
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'bedrock-agentcore:InvokeSession',
      pe.severity = CASE WHEN best_tier = 2 THEN 'high' ELSE 'medium' END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
