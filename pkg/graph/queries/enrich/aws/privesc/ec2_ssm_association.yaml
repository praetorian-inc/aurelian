id: aws/enrich/privesc/ec2_ssm_association
name: EC2 SSM Association Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ssm:CreateAssociation permission that can create State
  Manager associations to execute commands on SSM-managed EC2 instances, then extract
  the instance role's credentials via IMDS. The escalation target is the IAM role
  attached to a reachable instance (via HAS_ROLE), NOT an arbitrary principal. Requires
  the instance to have a bound role that is SSM-capable (trusts ssm) and more privileged
  than the attacker. Residual: instance running-state, IMDS HttpEndpoint and
  shell-document scoping are not in the graph.
severity: high
order: 100
cypher: |
  // Compute-takeover (catalog SSM rows 436-452): target = the role on an SSM-managed
  // instance the attacker can run an association on (HAS_ROLE, fail-closed). The action
  // edge often resolves to a '*'/Resource stub, so the action is required via EXISTS and
  // the instance is reached via HAS_ROLE. Guards: admin-as-source; self-target;
  // privileged-target (suppress non-privileged); exclude service-linked roles;
  // SSM-capable proxy (role trusts ssm via _ssm_enabled / trusted_services).
  MATCH (instance:Resource)-[:HAS_ROLE]->(victim:Principal)
  WHERE instance._resourceType = 'AWS::EC2::Instance'
  MATCH (attacker:Principal)
  WHERE coalesce(attacker._is_admin, false) <> true
    AND EXISTS { (attacker)-[perm]->() WHERE type(perm) = 'SSM_CREATEASSOCIATION' }
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._ssm_enabled, false) = true
         OR 'ssm.amazonaws.com' IN coalesce(victim.trusted_services, []))
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ssm:CreateAssociation',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        WHEN coalesce(victim._is_privileged, false) = true THEN 'medium'
        ELSE 'low'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
