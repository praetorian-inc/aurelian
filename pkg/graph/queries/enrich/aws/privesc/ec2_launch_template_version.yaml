id: aws/enrich/privesc/ec2_launch_template_version
name: EC2 CreateLaunchTemplateVersion + ModifyLaunchTemplate Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ec2:CreateLaunchTemplateVersion and ec2:ModifyLaunchTemplate
  that can create a new version of a launch template referencing a privileged instance
  profile and set it as default, causing new instances launched from the template to
  use the elevated role and exposing its credentials via IMDS. The escalation target is
  the PASSED ROLE, not an arbitrary principal: embedding a new instance-profile ARN in a
  template version still requires iam:PassRole on that role, so the role is bound via the
  IAM_PASSROLE edge. Guards: the role must trust ec2.amazonaws.com, have an instance
  profile, not be a service-linked role, and be more privileged than the attacker.
  Residual: whether an ASG/launcher actually consumes the template is not modeled.
severity: high
order: 100
cypher: |
  // New-passrole (catalog 132-135): the "no PassRole required" claim only holds if the
  // template already referenced that exact privileged profile; referencing a new
  // privileged instance profile requires iam:PassRole. Target = passed role (IAM_PASSROLE
  // edge), require BOTH template-edit actions (Create authors the version, Modify sets it
  // default) via EXISTS. Guards: admin-as-source; self-target; ec2 trust; instance profile
  // present; exclude service-linked roles; privileged-target tiering.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ec2.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND coalesce(victim.InstanceProfileList, '') CONTAINS 'arn:aws:iam'
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[c]->() WHERE type(c) = 'EC2_CREATELAUNCHTEMPLATEVERSION' }
    AND EXISTS { (attacker)-[m]->() WHERE type(m) = 'EC2_MODIFYLAUNCHTEMPLATE' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'ec2:CreateLaunchTemplateVersion + ec2:ModifyLaunchTemplate'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
