id: aws/enrich/privesc/ec2_launch_template_version
name: EC2 CreateLaunchTemplateVersion + ModifyLaunchTemplate Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ec2:CreateLaunchTemplateVersion and ec2:ModifyLaunchTemplate
  that can create a new version of an existing launch template with a privileged instance
  profile and set it as default, causing new instances launched from the template to
  use the elevated role. No iam:PassRole required for existing templates.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[create]->(target)
  WHERE type(create) = 'EC2_CREATELAUNCHTEMPLATEVERSION'
  WITH attacker, target
  MATCH (attacker)-[modify]->(target)
  WHERE type(modify) = 'EC2_MODIFYLAUNCHTEMPLATE'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ec2:CreateLaunchTemplateVersion + ec2:ModifyLaunchTemplate',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
