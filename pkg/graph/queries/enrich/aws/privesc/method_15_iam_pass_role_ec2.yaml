id: aws/enrich/privesc/method_15
name: IAM PassRole + EC2 Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ec2:RunInstances permissions 
  that can launch instances with elevated IAM roles.
severity: high
order: 115
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'EC2_RUNINSTANCES'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  SET pe.method = 'iam:PassRole + ec2:RunInstances',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
