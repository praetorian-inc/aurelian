id: aws/enrich/privesc/ecs_start_task
name: IAM PassRole + ECS StartTask Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ecs:StartTask that can launch a task on
  an EC2 container instance with a privileged task role and steal that role's credentials
  from the container metadata endpoint. The escalation target is the PASSED ROLE (not the
  cluster resource). Guards: the role must trust ecs-tasks.amazonaws.com, must not be a
  service-linked role, and must be more privileged than the attacker.

  PRECONDITION (not in graph): StartTask is EC2-launch-type only and requires a registered
  container instance plus a task definition that names the privileged role (so
  ecs:RegisterTaskDefinition or a pre-existing matching task def). These runtime/registration
  preconditions are not correlatable in the graph, so they are noted but not gated.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed ECS task role (mirrors iam_pass_role_ec2). Guards:
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ecs trust: 'ecs-tasks.amazonaws.com' IN victim.trusted_services (fail-closed).
  //   - exclude service-linked roles (':role/aws-service-role/').
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ecs-tasks.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[start]->(service_resource)
  WHERE type(start) = 'ECS_STARTTASK'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + ecs:StartTask'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
