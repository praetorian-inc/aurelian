id: aws/enrich/privesc/iam_pass_role_cloudformation
name: IAM PassRole + CloudFormation Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and cloudformation:CreateStack that can deploy
  a stack whose service role is a privileged IAM role, minting arbitrary IAM resources via
  CloudFormation. The escalation target is the PASSED ROLE (not the CloudFormation service
  resource). Guards: the role must trust cloudformation.amazonaws.com, must not be
  service-linked, and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (per FP catalog method_16 / B.1):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - cfn trust: 'cloudformation.amazonaws.com' IN victim.trusted_services.
  //   - exclude service-linked roles (cannot serve as a CFN service role).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'cloudformation.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'CLOUDFORMATION_CREATESTACK'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + cloudformation:CreateStack'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
