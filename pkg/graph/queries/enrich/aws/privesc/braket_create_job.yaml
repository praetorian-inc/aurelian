id: aws/enrich/privesc/braket_create_job
name: IAM PassRole + Amazon Braket Hybrid Job Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and braket:CreateJob that can launch an Amazon
  Braket Hybrid Job carrying a privileged IAM role and run a malicious Python script that
  steals the role's credentials. The escalation target is the PASSED ROLE (not the Braket
  service resource). Guards: the role must trust Braket (braket.amazonaws.com), must live in
  the attacker's account, and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (cross-cutting + service trust):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - Braket trust: 'braket.amazonaws.com' IN victim.trusted_services.
  //   - same-account: PassRole is account-local.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'braket.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND split(coalesce(victim.Arn, victim.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'BRAKET_CREATEJOB'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + braket:CreateJob',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
