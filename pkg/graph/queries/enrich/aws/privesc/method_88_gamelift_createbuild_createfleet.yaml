id: aws/enrich/privesc/method_88
name: IAM PassRole + GameLift CreateBuild + CreateFleet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, gamelift:CreateBuild, and gamelift:CreateFleet
  that can upload a malicious game server build and create a GameLift fleet with an admin
  instance role to extract credentials via IMDS. CreateBuild must precede CreateFleet.
severity: high
order: 188
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[build]->(svc)
  WHERE type(build) = 'GAMELIFT_CREATEBUILD'
  WITH attacker, victim, svc
  MATCH (attacker)-[fleet]->(svc2)
  WHERE type(fleet) = 'GAMELIFT_CREATEFLEET'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + gamelift:CreateBuild + gamelift:CreateFleet',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
