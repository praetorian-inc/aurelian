id: aws/enrich/privesc/method_78
name: IAM PassRole + Glue UpdateJob + CreateTrigger Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, glue:UpdateJob, and glue:CreateTrigger that can
  modify an existing Glue job to use a privileged service role and create an automated
  trigger for persistent execution without requiring on-demand StartJobRun permission.
severity: high
order: 178
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[update]->(svc)
  WHERE type(update) = 'GLUE_UPDATEJOB'
  WITH attacker, svc
  MATCH (attacker)-[trigger]->(svc)
  WHERE type(trigger) = 'GLUE_CREATETRIGGER'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(svc)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:UpdateJob + glue:CreateTrigger',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
