id: aws/enrich/privesc/method_17
name: IAM PassRole + DataPipeline Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and datapipeline:CreatePipeline permissions 
  that can create data pipelines with elevated IAM roles.
severity: high
order: 117
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'DATAPIPELINE_CREATEPIPELINE'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  SET pe.method = 'iam:PassRole + datapipeline:CreatePipeline',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
