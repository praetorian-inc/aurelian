id: aws/enrich/privesc/method_52
name: EC2 Instance Connect SSH Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ec2-instance-connect:SendSSHPublicKey permission that
  can push a temporary SSH public key to an EC2 instance, SSH in, and extract
  IAM role credentials from the instance metadata service (IMDS).
severity: high
order: 152
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'EC2-INSTANCE-CONNECT_SENDSSHPUBLICKEY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ec2-instance-connect:SendSSHPublicKey',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
