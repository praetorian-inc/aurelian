id: aws/enrich/privesc/method_07
name: IAM AttachGroupPolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:AttachGroupPolicy permission that can attach 
  managed policies to IAM groups.
severity: high
order: 107
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_ATTACHGROUPPOLICY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:AttachGroupPolicy',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
