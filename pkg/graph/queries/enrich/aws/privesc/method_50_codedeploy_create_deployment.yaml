id: aws/enrich/privesc/method_50
name: CodeDeploy CreateDeployment Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with codedeploy:CreateDeployment permission that can escalate
  privileges by deploying a malicious revision whose lifecycle hooks execute as the
  target EC2 instance's admin instance profile.
severity: high
order: 150
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'CODEDEPLOY_CREATEDEPLOYMENT'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'codedeploy:CreateDeployment',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
