id: aws/enrich/privesc/iam_pass_role_datapipeline
name: IAM PassRole + DataPipeline Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals that can run a Data Pipeline under a privileged role and abuse its
  credentials. The escalation target is the PASSED ROLE (not the DataPipeline service
  resource). Guards: the role must trust datapipeline.amazonaws.com (the pipeline role),
  must not be service-linked, must be more privileged than the attacker, AND the attacker
  must hold the FULL action set required to actually run a pipeline:
  iam:PassRole + datapipeline:CreatePipeline + datapipeline:PutPipelineDefinition +
  datapipeline:ActivatePipeline (CreatePipeline alone only creates an empty object, so it
  is not sufficient on its own).

  NOTE: Data Pipeline service availability (deprecated for new customers) is not a graph
  signal and is not checked.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (per FP catalog method_17 / 380-382 / B.1):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - datapipeline trust: 'datapipeline.amazonaws.com' IN victim.trusted_services.
  //   - exclude service-linked roles.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  //   - full combo enforced: CreatePipeline + PutPipelineDefinition + ActivatePipeline
  //     (the action edges are resource-scoped to the pipeline, so require via EXISTS).
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'datapipeline.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[c]->() WHERE type(c) = 'DATAPIPELINE_CREATEPIPELINE' }
    AND EXISTS { (attacker)-[c]->() WHERE type(c) = 'DATAPIPELINE_PUTPIPELINEDEFINITION' }
    AND EXISTS { (attacker)-[c]->() WHERE type(c) = 'DATAPIPELINE_ACTIVATEPIPELINE' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + datapipeline:CreatePipeline + PutPipelineDefinition + ActivatePipeline'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
