id: aws/enrich/privesc/batch_submit_job
name: AWS Batch SubmitJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with batch:SubmitJob that can submit to an EXISTING Batch job
  definition carrying a privileged jobRoleArn, overriding the container command to steal
  that role's credentials (no iam:PassRole required).

  The escalation target is the job definition's JOB ROLE (reached via the
  resource_service_role enricher's HAS_ROLE edge from AWS::Batch::JobDefinition —
  ContainerProperties.JobRoleArn / ExecutionRoleArn, now collected by the graph recon
  module's Batch job-definition collector via batch:DescribeJobDefinitions), not an
  arbitrary principal. A job definition with no job role runs its containers as the Batch
  agent's own credentials and confers no escalation, so the HAS_ROLE link is mandatory
  (fail-closed). Guards: the job role must be ecs-tasks-trusting (the trust the container
  agent assumes), more privileged than the attacker, and in the attacker's account.
severity: high
order: 100
cypher: |
  // Existing-passrole / compute-takeover (per FP catalog / method_46): SubmitJob hijacks an
  // existing job definition's jobRoleArn. Re-pointed (D4 pass 3) from the existence-precondition
  // stub at the SPECIFIC job role via (jobdef)-[:HAS_ROLE]->(jobrole). HAS_ROLE is mandatory
  // (fail-closed): a roleless job definition runs as the agent, conferring nothing. SubmitJob
  // maps to the Batch service wildcard, so its permission edge resolves to the service stub,
  // not the specific job-definition node — carrying it through would break the HAS_ROLE join
  // (false negatives). So keep the cross-product (jobdef)-[:HAS_ROLE]->(jobrole) MATCH (mirrors
  // cloudformation_changeset) and constrain it. Expressible guards (catalog method_46):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ecs-tasks trust: the job role is assumed by the container agent (ecs-tasks.amazonaws.com).
  //   - privileged-target: suppress non-privileged job roles; tier severity by the target.
  //   - same-account guard (ARN segment 4 equality) so a multi-tenant graph can't link a job
  //     definition in one account to an attacker in another.
  MATCH (attacker:Principal)-[perm]->()
  WHERE type(perm) = 'BATCH_SUBMITJOB'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (jobdef:Resource)-[:HAS_ROLE]->(jobrole:Role)
  WHERE jobdef._resourceType = 'AWS::Batch::JobDefinition'
    AND 'ecs-tasks.amazonaws.com' IN coalesce(jobrole.trusted_services, [])
    AND (coalesce(jobrole._is_admin, false) = true OR coalesce(jobrole._is_privileged, false) = true)
    AND coalesce(jobrole.Arn, jobrole.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND split(coalesce(jobrole.Arn, jobrole.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
  WITH DISTINCT attacker, jobrole
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'batch:SubmitJob'}]->(jobrole)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(jobrole._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
