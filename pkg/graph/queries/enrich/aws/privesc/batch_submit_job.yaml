id: aws/enrich/privesc/batch_submit_job
name: AWS Batch SubmitJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with batch:SubmitJob permission that can submit a job to an
  existing Batch job definition carrying an admin jobRoleArn, overriding the
  container command to execute privilege escalation logic.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'BATCH_SUBMITJOB'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'batch:SubmitJob',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
