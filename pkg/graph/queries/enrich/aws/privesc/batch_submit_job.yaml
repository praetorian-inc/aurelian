id: aws/enrich/privesc/batch_submit_job
name: AWS Batch SubmitJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with batch:SubmitJob that can submit to an EXISTING Batch job
  definition carrying a privileged jobRoleArn, overriding the container command to steal
  that role's credentials (no iam:PassRole required).

  STILL-DEFERRED (D4 — backing resource NOT collected, SDK not a dependency): re-pointing at
  the real role requires collecting AWS::Batch::JobDefinition
  (batch:DescribeJobDefinitions -> ContainerProperties.JobRoleArn / ExecutionRoleArn) and
  linking it via HAS_ROLE. The API exists and exposes the role ARNs, BUT the AWS SDK module
  github.com/aws/aws-sdk-go-v2/service/batch is NOT a dependency of this repo (absent from
  go.mod AND go.sum); adding a new SDK dependency is out of scope. JobDefinitions are
  therefore not in the graph, so a JobDefinition->Role enricher could never fire (it would be
  vacuous — worse than this honest fail-open). The sound fail-open existence-precondition
  below is retained until the batch SDK is added and a collector lands.

  The batch:SubmitJob permission edge resolves to the Batch SERVICE wildcard resource
  (arn:aws:batch:*:*:*), NOT to a specific job-definition node, so the graph carries no
  JobDefinition->Role linkage to identify the exact target role. The escalation edge therefore terminates at the matched Batch service
  resource (NOT at an arbitrary Role — that would re-introduce a filtered cartesian fan-out
  to roles no job definition references). The catalog's trust + privileged-target guards
  ARE applied, in the only sound form available without the link: as an EXISTENCE
  precondition requiring at least one ecs-tasks-trusting, privileged Role in the account,
  so the method is suppressed entirely when no viable target role could exist. Severity is
  tiered by the strongest such candidate role (admin -> high, privileged-only -> medium).
  Once the JobDefinition->Role enricher lands, re-point the edge at the specific job role.
severity: high
order: 100
cypher: |
  // Existing-passrole / compute-takeover (per FP catalog / method_46): SubmitJob hijacks an
  // existing job definition's jobRoleArn. SubmitJob maps to the Batch service wildcard, so
  // there is no per-job-definition role node; the edge terminates at the service resource
  // (no second fan-out MATCH to every Principal). Expressible guards (catalog method_46):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - trust + privilege applied as an existence precondition: require >=1 ecs-tasks-trusting
  //     privileged Role IN THE ATTACKER'S ACCOUNT (ARN segment 4 equality); suppress when
  //     none exists; tier severity by the best. The account guard stops a candidate role in
  //     another tenant's account from satisfying the precondition in a multi-account graph.
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'BATCH_SUBMITJOB'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  WITH DISTINCT attacker, target
  MATCH (jobrole:Role)
  WHERE 'ecs-tasks.amazonaws.com' IN coalesce(jobrole.trusted_services, [])
    AND (coalesce(jobrole._is_admin, false) = true OR coalesce(jobrole._is_privileged, false) = true)
    AND coalesce(jobrole.Arn, jobrole.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND split(coalesce(jobrole.Arn, jobrole.arn), ':')[4] = split(coalesce(attacker.Arn, attacker.arn), ':')[4]
  WITH attacker, target,
       max(CASE WHEN coalesce(jobrole._is_admin, false) = true THEN 2 ELSE 1 END) AS best_tier
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'batch:SubmitJob'}]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE WHEN best_tier = 2 THEN 'high' ELSE 'medium' END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
