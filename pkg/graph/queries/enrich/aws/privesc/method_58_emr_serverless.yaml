id: aws/enrich/privesc/method_58
name: IAM PassRole + EMR Serverless Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and emr-serverless:CreateApplication
  permissions that can create an EMR Serverless application with a privileged
  execution role and run a job to escalate privileges.
severity: high
order: 158
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'EMR-SERVERLESS_CREATEAPPLICATION'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + emr-serverless:CreateApplication',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
