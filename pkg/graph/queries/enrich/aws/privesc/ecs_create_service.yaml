id: aws/enrich/privesc/ecs_create_service
name: IAM PassRole + ECS CreateService Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ecs:CreateService permissions
  that can deploy a persistent ECS service with an administrative task role
  to extract credentials and escalate privileges.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'ECS_CREATESERVICE'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + ecs:CreateService',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
