id: aws/enrich/privesc/ecs_create_service
name: IAM PassRole + ECS CreateService Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ecs:CreateService that can deploy a
  persistent ECS service whose task role is a privileged role, then extract that role's
  credentials from the container metadata endpoint. The escalation target is the PASSED
  ROLE (not the cluster resource). Guards: the role must trust ecs-tasks.amazonaws.com
  (else the task assume-role fails), must not be a service-linked role, and must be more
  privileged than the attacker.

  PRECONDITION (not in graph): deploying a privileged-role service also needs a task
  definition that names that role — ecs:RegisterTaskDefinition or a pre-existing task
  def referencing it. The graph has no attacker->RegisterTaskDefinition correlation nor a
  task-def-to-role binding for this method, so it is not gated here; networking/capacity
  for Fargate is likewise runtime-only.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed ECS task role (mirrors iam_pass_role_ec2). Guards:
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ecs trust: 'ecs-tasks.amazonaws.com' IN victim.trusted_services (fail-closed).
  //   - exclude service-linked roles (':role/aws-service-role/').
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ecs-tasks.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'ECS_CREATESERVICE'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + ecs:CreateService',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
