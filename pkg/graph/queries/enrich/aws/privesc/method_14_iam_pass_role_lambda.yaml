id: aws/enrich/privesc/method_14
name: IAM PassRole + Lambda Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and lambda:CreateFunction/UpdateFunctionCode 
  permissions that can execute code with elevated permissions.
severity: high
order: 114
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) IN ['LAMBDA_CREATEFUNCTION', 'LAMBDA_UPDATEFUNCTIONCODE']
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  SET pe.method = 'iam:PassRole + lambda:CreateFunction',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
