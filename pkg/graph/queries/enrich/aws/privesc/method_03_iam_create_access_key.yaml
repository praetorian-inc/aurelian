id: aws/enrich/privesc/method_03
name: IAM CreateAccessKey Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:CreateAccessKey permission that can create 
  access keys for other users.
severity: high
order: 103
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_CREATEACCESSKEY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:CreateAccessKey',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
