id: aws/enrich/privesc/method_19
name: IAM PassRole + SageMaker Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and sagemaker:CreateNotebookInstance permissions 
  that can create notebook instances with elevated IAM roles.
severity: high
order: 119
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'SAGEMAKER_CREATENOTEBOOKINSTANCE'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  SET pe.method = 'iam:PassRole + sagemaker:CreateNotebookInstance',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
