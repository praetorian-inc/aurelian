id: aws/enrich/privesc/iam_attach_role_policy
name: IAM AttachRolePolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:AttachRolePolicy on a role they can ALSO assume: they
  attach an admin managed policy to that role and then assume it. The escalation target
  is the role whose trust the attacker can enter (a modeled CAN_ASSUME trust edge), not
  every principal. Attaching admin to a role with no assumption path grants privilege the
  attacker can never use, so a usable assume path is required.

  Because the attacker GRANTS the privilege via the attach, the role need not be
  pre-privileged (no privileged-target suppression); this trust-backed direct takeover
  fails OPEN on target privilege, with severity tiered admin -> high, privileged ->
  medium, unknown/non-privileged -> low.
severity: high
order: 100
cypher: |
  // Trust-backed: AttachRolePolicy + an assume path to the SAME role (the target).
  // Guards (per FP catalog method_258/260, method_302):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - require a usable assumption path: a modeled CAN_ASSUME trust edge to the role.
  //   - exclude service-linked roles (cannot attach customer policies; not assumable).
  //   - NO privileged-target suppression: the attacker grants the privilege via the
  //     attach, so a non-privileged target is still a real takeover (low).
  MATCH (attacker:Principal)-[:CAN_ASSUME]->(victim:Role)
  WHERE coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND EXISTS { (attacker)-[perm]->(victim) WHERE type(perm) = 'IAM_ATTACHROLEPOLICY' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:AttachRolePolicy'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        WHEN coalesce(victim._is_privileged, false) = true THEN 'medium'
        ELSE 'low'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
