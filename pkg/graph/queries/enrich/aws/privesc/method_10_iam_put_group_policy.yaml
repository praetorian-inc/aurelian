id: aws/enrich/privesc/method_10
name: IAM PutGroupPolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PutGroupPolicy permission that can add or modify 
  inline policies on IAM groups.
severity: high
order: 110
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_PUTGROUPPOLICY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PutGroupPolicy',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
