id: aws/enrich/privesc/sagemaker_lifecycle_config
name: SageMaker UpdateNotebookInstanceLifecycleConfig Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with sagemaker:UpdateNotebookInstanceLifecycleConfig permission
  that can inject a malicious lifecycle configuration into an existing notebook
  instance to execute code with the notebook's privileged IAM role on next restart.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'SAGEMAKER_UPDATENOTEBOOKINSTANCELIFECYCLECONFIG'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'sagemaker:UpdateNotebookInstanceLifecycleConfig',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
