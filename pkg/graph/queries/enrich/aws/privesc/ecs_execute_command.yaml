id: aws/enrich/privesc/ecs_execute_command
name: ECS ExecuteCommand Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ecs:ExecuteCommand that can open an interactive shell into a
  running ECS task and retrieve the task role's credentials from the container metadata
  endpoint. The escalation target is the TASK ROLE the task runs as — reached via
  (Resource:AWS::ECS::TaskDefinition)-[:HAS_ROLE]->(Principal) from the resource_service_role
  enricher (which maps TaskRoleArn). The prior query fanned CAN_PRIVESC out to EVERY other
  principal; that is replaced with a fail-closed HAS_ROLE join, so a task def with no
  resolvable task role yields no edge.

  PRECONDITIONS (not in graph): exec must be enabled on the task (enableExecuteCommand=true),
  a task must actually be RUNNING, and the role reached must be the task ROLE (not the
  execution role — only the task role's creds are exposed via the metadata endpoint).
  The ExecuteCommand permission may also be scoped to a cluster/service/task resource that
  the graph does not correlate to a specific task definition; these are noted, not gated.
severity: high
order: 100
cypher: |
  // Existing-compute takeover: target = task role via (TaskDefinition)-[:HAS_ROLE]->(role)
  // (mandatory, fail-closed). Guards:
  //   - admin-as-source exclusion; self-target exclusion.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[perm]->()
  WHERE type(perm) = 'ECS_EXECUTECOMMAND'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (taskdef:Resource)-[:HAS_ROLE]->(victim:Principal)
  WHERE taskdef._resourceType = 'AWS::ECS::TaskDefinition'
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'ecs:ExecuteCommand'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        WHEN coalesce(victim._is_privileged, false) = true THEN 'medium'
        ELSE 'low'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
