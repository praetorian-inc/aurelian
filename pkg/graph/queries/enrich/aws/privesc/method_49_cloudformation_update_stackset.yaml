id: aws/enrich/privesc/method_49
name: IAM PassRole + CloudFormation UpdateStackSet Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and cloudformation:UpdateStackSet
  permissions that can modify an existing CloudFormation StackSet to create
  escalated IAM resources using the StackSet's elevated execution role.
severity: high
order: 149
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[update]->(service_resource)
  WHERE type(update) = 'CLOUDFORMATION_UPDATESTACKSET'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + cloudformation:UpdateStackSet',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
