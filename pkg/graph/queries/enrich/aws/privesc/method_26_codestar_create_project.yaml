id: aws/enrich/privesc/method_26
name: CodeStar CreateProject Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with codestar:CreateProject permission that can create 
  projects with elevated IAM roles for CI/CD pipelines.
severity: medium
order: 126
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'CODESTAR_CREATEPROJECT'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'codestar:CreateProject',
      pe.severity = 'medium',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
