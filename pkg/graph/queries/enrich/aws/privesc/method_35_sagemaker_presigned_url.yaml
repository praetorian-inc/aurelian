id: aws/enrich/privesc/method_35
name: SageMaker CreatePresignedNotebookInstanceUrl Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with sagemaker:CreatePresignedNotebookInstanceUrl permission
  that can access SageMaker notebook instances with elevated execution roles.
severity: high
order: 135
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'SAGEMAKER_CREATEPRESIGNEDNOTEBOOKINSTANCEURL'
  AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'sagemaker:CreatePresignedNotebookInstanceUrl',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
