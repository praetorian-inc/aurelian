id: aws/enrich/privesc/method_73
name: IAM PassRole + EC2 RequestSpotInstances Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole and ec2:RequestSpotInstances permissions
  that can launch a spot instance with a privileged instance profile and extract
  credentials via IMDS. RequestSpotInstances is a distinct IAM action from RunInstances.
severity: high
order: 173
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[spot]->(service_resource)
  WHERE type(spot) = 'EC2_REQUESTSPOTINSTANCES'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + ec2:RequestSpotInstances',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
