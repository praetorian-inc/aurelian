id: aws/enrich/privesc/ssm_createdocument_startautomation
name: SSM CreateDocument + StartAutomationExecution Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ssm:CreateDocument and ssm:StartAutomationExecution that can
  create a custom SSM Automation document with a Python aws:executeScript step and run
  it to execute privileged AWS API calls. No iam:PassRole required — the automation
  runs under the principal's own permissions or an AssumeRole target specified inline.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[create]->(target)
  WHERE type(create) = 'SSM_CREATEDOCUMENT'
  WITH attacker, target
  MATCH (attacker)-[start]->(target)
  WHERE type(start) = 'SSM_STARTAUTOMATIONEXECUTION'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ssm:CreateDocument + ssm:StartAutomationExecution',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
