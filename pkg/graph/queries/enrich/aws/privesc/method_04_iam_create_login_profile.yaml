id: aws/enrich/privesc/method_04
name: IAM CreateLoginProfile Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:CreateLoginProfile permission that can create 
  console passwords for other IAM users.
severity: high
order: 104
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_CREATELOGINPROFILE'
  AND coalesce(target.Arn, target.arn) <> coalesce(attacker.Arn, attacker.arn)
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:CreateLoginProfile',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
