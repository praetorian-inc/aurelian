id: aws/enrich/privesc/ssm_send_command
name: SSM SendCommand Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ssm:SendCommand who can run shell commands on an EC2 instance
  and steal the credentials of the IAM role attached to that instance via IMDS. The
  escalation target is the instance's bound role (reached via HAS_ROLE), NOT an arbitrary
  principal — SSM compute takeover only yields the role on a reachable instance. Guards:
  the instance must have a bound role (HAS_ROLE, fail-closed), the role must be
  SSM-capable (trusts ssm so the agent registers), and must be more privileged than the
  attacker. Residual: instance running-state / shell-document scoping are not in the graph.
severity: high
order: 100
cypher: |
  // Compute-takeover (B-cat 4): target = role on a reachable EC2 instance, via HAS_ROLE.
  // Guards (per FP catalog rows 436-440):
  //   - admin-as-source exclusion.
  //   - HAS_ROLE mandatory (fail-closed): no bound role => no creds to steal.
  //   - SSM-capable role: _ssm_enabled OR trusts ssm.amazonaws.com (else InvalidInstanceId).
  //   - self-target exclusion; privileged-target suppression (lateral => drop).
  MATCH (attacker:Principal)-[perm]->()
  WHERE type(perm) = 'SSM_SENDCOMMAND'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (instance:Resource {_resourceType: 'AWS::EC2::Instance'})-[:HAS_ROLE]->(victim:Principal)
  WHERE coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND (coalesce(victim._ssm_enabled, false) = true
         OR 'ssm.amazonaws.com' IN coalesce(victim.trusted_services, []))
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'ssm:SendCommand'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        WHEN coalesce(victim._is_privileged, false) = true THEN 'medium'
        ELSE 'low'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
