id: aws/enrich/privesc/method_28
name: IAM CreateServiceLinkedRole Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:CreateServiceLinkedRole permission that can create 
  service-linked roles with predefined elevated permissions.
severity: medium
order: 128
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_CREATESERVICELINKEDROLE'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'iam:CreateServiceLinkedRole',
      pe.severity = 'medium',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
