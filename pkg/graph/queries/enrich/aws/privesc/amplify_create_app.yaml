id: aws/enrich/privesc/amplify_create_app
name: IAM PassRole + Amplify CreateApp + CreateBranch + StartJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, amplify:CreateApp, amplify:CreateBranch, and
  amplify:StartJob that can create an Amplify app connected to a repository containing
  a malicious amplify.yml build spec that executes with the passed IAM role.
severity: high
order: 100
cypher: |
  // New-passrole + multi-perm: target = passed role (the Amplify app build/service role
  // that runs the malicious amplify.yml build spec). All three amplify actions are
  // required; expressed as EXISTS predicates on the SAME attacker so there is no fan-out
  // to other principals/resources. Guards (cross-cutting / FP catalog):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - amplify trust: 'amplify.amazonaws.com' IN victim.trusted_services.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'amplify.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[app]->() WHERE type(app) = 'AMPLIFY_CREATEAPP' }
    AND EXISTS { (attacker)-[branch]->() WHERE type(branch) = 'AMPLIFY_CREATEBRANCH' }
    AND EXISTS { (attacker)-[job]->() WHERE type(job) = 'AMPLIFY_STARTJOB' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + amplify:CreateApp + amplify:CreateBranch + amplify:StartJob'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
