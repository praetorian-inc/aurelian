id: aws/enrich/privesc/glue_createjob_createtrigger
name: IAM PassRole + Glue CreateJob + CreateTrigger Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, glue:CreateJob, and glue:CreateTrigger that can
  create a Glue job with a privileged service role and set up an automated trigger for
  persistent execution without requiring on-demand StartJobRun permission.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[create]->(svc)
  WHERE type(create) = 'GLUE_CREATEJOB'
  WITH attacker, victim, svc
  MATCH (attacker)-[trigger]->(svc)
  WHERE type(trigger) = 'GLUE_CREATETRIGGER'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:CreateJob + glue:CreateTrigger',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
