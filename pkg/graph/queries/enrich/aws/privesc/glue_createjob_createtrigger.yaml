id: aws/enrich/privesc/glue_createjob_createtrigger
name: IAM PassRole + Glue CreateJob + CreateTrigger Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, glue:CreateJob, and glue:CreateTrigger that can
  create a Glue job with a privileged service role and set up an automated trigger for
  persistent execution without requiring on-demand StartJobRun permission. The escalation
  target is the PASSED ROLE (the IAM_PASSROLE victim), not the Glue job stub. Guards: the
  role must trust glue.amazonaws.com, must not be a service-linked role, and must be more
  privileged than the attacker.

  RESIDUAL (deliberately fail-open, unobservable in the graph): CreateTrigger alone does not
  execute the job - a SCHEDULED/CONDITIONAL trigger must be activated (glue:StartTrigger or
  start_on_creation). glue:StartTrigger is NOT one of the Glue actions the IAM evaluator
  tracks (see pkg/aws/iam/action.go), so a GLUE_STARTTRIGGER edge is never emitted; requiring
  it would be an always-false predicate dropping every true positive. Trigger-activation
  feasibility is therefore left fail-open and flagged here, not enforced in Cypher (method_77).
severity: high
order: 100
cypher: |
  // Multi-perm new-passrole (B.5/B.1): create a NEW job, so target = passed role (no
  // existing job to take over via HAS_ROLE). Guards (FP catalog method_77):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - glue trust: 'glue.amazonaws.com' IN victim.trusted_services (a triggered run cannot
  //     assume a role Glue cannot back, so no privileged execution).
  //   - exclude service-linked roles (aws-service-role path).
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  //   - CreateJob AND CreateTrigger matched by type existence on the attacker, NOT forced
  //     onto a shared svc stub node (brittle on sparse wildcard stubs - method_77).
  //   - RESIDUAL (fail-open): trigger activation (glue:StartTrigger) is NOT a tracked action
  //     and never reaches the graph, so it cannot be gated - documented in the description.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'glue.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND NOT coalesce(victim.Arn, victim.arn) CONTAINS ':role/aws-service-role/'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
    AND EXISTS { (attacker)-[create]->() WHERE type(create) = 'GLUE_CREATEJOB' }
    AND EXISTS { (attacker)-[trigger]->() WHERE type(trigger) = 'GLUE_CREATETRIGGER' }
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:CreateJob + glue:CreateTrigger',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
