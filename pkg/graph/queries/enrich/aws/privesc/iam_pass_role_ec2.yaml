id: aws/enrich/privesc/iam_pass_role_ec2
name: IAM PassRole + EC2 Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and ec2:RunInstances that can launch an
  instance carrying a privileged IAM role and steal its credentials via IMDS. The
  escalation target is the PASSED ROLE (not the EC2 service resource). Guards: the
  role must trust ec2.amazonaws.com, must have an instance profile (EC2 attaches roles
  via instance profiles), and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole: target = passed role. Guards (per FP catalog / B.1):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ec2 trust: 'ec2.amazonaws.com' IN victim.trusted_services.
  //   - instance profile present: InstanceProfileList is a JSON string -> CONTAINS arn.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ec2.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND coalesce(victim.InstanceProfileList, '') CONTAINS 'arn:aws:iam'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[create]->(service_resource)
  WHERE type(create) = 'EC2_RUNINSTANCES'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + ec2:RunInstances',
      pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
