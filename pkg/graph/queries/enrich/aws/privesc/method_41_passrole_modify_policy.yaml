id: aws/enrich/privesc/method_41
name: PassRole + Policy Modification Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals that can modify a role's policies (PutRolePolicy or AttachRolePolicy)
  and use it via a service (PassRole + service execution). This compound method covers
  scenarios where the attacker cannot directly assume the role but can modify its policies.
severity: high
order: 141
cypher: |
  MATCH (attacker:Principal)-[modify]->(target:Role)
  WHERE type(modify) IN ['IAM_PUTROLEPOLICY', 'IAM_ATTACHROLEPOLICY']
  AND target.Arn <> attacker.Arn
  WITH attacker, target
  MATCH (attacker)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(target)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + policy modification',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
