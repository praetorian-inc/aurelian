id: aws/enrich/privesc/method_09
name: IAM PutUserPolicy Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PutUserPolicy permission that can add or modify 
  inline policies on IAM users.
severity: high
order: 109
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'IAM_PUTUSERPOLICY'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  SET pe.method = 'iam:PutUserPolicy',
      pe.severity = 'high',
      pe._updated = timestamp()
  ON CREATE SET pe._created = timestamp()
  RETURN count(pe) as edges_created
