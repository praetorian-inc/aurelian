id: aws/enrich/privesc/glue_update_job
name: IAM PassRole + Glue UpdateJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and glue:UpdateJob permissions
  that can modify an existing Glue job to use a privileged IAM role and
  a malicious script to escalate privileges on the next execution.
severity: high
order: 100
cypher: |
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker, victim
  MATCH (attacker)-[update]->(service_resource)
  WHERE type(update) = 'GLUE_UPDATEJOB'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + glue:UpdateJob',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
