id: aws/enrich/privesc/glue_update_job
name: IAM PassRole + Glue UpdateJob Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with glue:UpdateJob that can modify an EXISTING Glue job - injecting a
  malicious script that runs under the job's privileged service role on the job's next
  execution. This is an existing-resource takeover: the escalation target is the SERVICE ROLE
  bound to a Glue job the attacker can modify, reached via the resource_service_role
  enricher's (Resource{AWS::Glue::Job})-[:HAS_ROLE]->(Role) edge. The HAS_ROLE link is
  MANDATORY (fail-closed): no resolvable Glue job role -> no edge, which directly enforces
  the FP-catalog method_61 "require at least one existing Glue Job resource" precondition
  (resource_service_role.yaml DOES tag AWS::Glue::Job nodes).

  DOWN-RANKED (incomplete combo): UpdateJob alone has no execution path here (no
  glue:StartJobRun, no glue:CreateTrigger). The injected code runs only on the job's NEXT
  run, which this attacker cannot trigger on demand - a persistence/wait primitive, not
  self-sufficient escalation (FP catalog method_61). Severity is capped at 'low'; the full
  attack paths are modeled by glue_updatejob_startjobrun / glue_updatejob_createtrigger.
severity: high
order: 100
cypher: |
  // Existing-resource takeover, incomplete combo (D/B.4 + FP catalog method_61): drop the
  // all-principals fan-out AND the IAM_PASSROLE join. UpdateJob mutates an EXISTING job, so
  // the victim is the privileged role bound to a Glue job the attacker can update, reached
  // via (Resource{AWS::Glue::Job})-[:HAS_ROLE]->(role). resource_service_role.yaml (order 15)
  // populates this edge for AWS::Glue::Job, so the catalog's existing-job precondition is
  // gated fail-closed (no job -> no HAS_ROLE -> no edge). Glue-trust and SLR guards are
  // implied (a role bound to a live Glue job is Glue-assumable and not an SLR). Guards:
  // admin-as-source exclusion; self-target exclusion; privileged-target suppression.
  // Severity capped at 'low' (no execute path -> persistence/wait, method_61).
  MATCH (attacker:Principal)-[update]->()
  WHERE type(update) = 'GLUE_UPDATEJOB'
    AND coalesce(attacker._is_admin, false) <> true
  WITH DISTINCT attacker
  MATCH (job:Resource)-[:HAS_ROLE]->(victim:Principal)
  WHERE job._resourceType = 'AWS::Glue::Job'
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'glue:UpdateJob',
      pe.severity = 'low',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
