id: aws/enrich/privesc/imagebuilder_createimage
name: IAM PassRole + EC2 Image Builder CreateInfrastructureConfiguration + CreateImage Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole, imagebuilder:CreateInfrastructureConfiguration, and
  imagebuilder:CreateImage that can configure an EC2 Image Builder pipeline carrying a
  privileged instance profile and trigger a build whose component shell commands steal admin
  credentials via IMDS. The escalation target is the PASSED ROLE (not the Image Builder
  service resource). Both imagebuilder actions are required and joined to the same service
  node. Guards: the role must trust ec2.amazonaws.com (Image Builder builds run on EC2),
  must have an instance profile, and must be more privileged than the attacker.
severity: high
order: 100
cypher: |
  // New-passrole (multi-perm): target = passed role; CreateInfrastructureConfiguration +
  // CreateImage required on the SAME service node. Guards (new-passrole + multi-perm):
  //   - admin-as-source exclusion; self-target exclusion.
  //   - ec2 trust: 'ec2.amazonaws.com' IN victim.trusted_services (Image Builder uses EC2).
  //   - instance profile present: InstanceProfileList is a JSON string -> CONTAINS arn.
  //   - privileged-target tiering: admin -> high, privileged -> medium, else suppress.
  MATCH (attacker:Principal)-[passrole]->(victim:Principal)
  WHERE type(passrole) = 'IAM_PASSROLE'
    AND coalesce(attacker._is_admin, false) <> true
    AND coalesce(victim.Arn, victim.arn) <> coalesce(attacker.Arn, attacker.arn)
    AND 'ec2.amazonaws.com' IN coalesce(victim.trusted_services, [])
    AND coalesce(victim.InstanceProfileList, '') CONTAINS 'arn:aws:iam'
    AND (coalesce(victim._is_admin, false) = true OR coalesce(victim._is_privileged, false) = true)
  WITH DISTINCT attacker, victim
  MATCH (attacker)-[infra]->(svc)
  WHERE type(infra) = 'IMAGEBUILDER_CREATEINFRASTRUCTURECONFIGURATION'
  WITH DISTINCT attacker, victim, svc
  MATCH (attacker)-[image]->(svc)
  WHERE type(image) = 'IMAGEBUILDER_CREATEIMAGE'
  WITH DISTINCT attacker, victim
  MERGE (attacker)-[pe:CAN_PRIVESC {method: 'iam:PassRole + imagebuilder:CreateInfrastructureConfiguration + imagebuilder:CreateImage'}]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.severity = CASE
        WHEN coalesce(victim._is_admin, false) = true THEN 'high'
        ELSE 'medium'
      END,
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
