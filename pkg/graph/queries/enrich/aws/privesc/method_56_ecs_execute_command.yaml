id: aws/enrich/privesc/method_56
name: ECS ExecuteCommand Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with ecs:ExecuteCommand permission that can open an
  interactive shell into a running ECS task with a privileged IAM task role
  and retrieve credentials from the container metadata service.
severity: high
order: 156
cypher: |
  MATCH (attacker:Principal)-[perm]->(target)
  WHERE type(perm) = 'ECS_EXECUTECOMMAND'
  WITH attacker
  MATCH (victim:Principal)
  WHERE victim.Arn <> attacker.Arn
  MERGE (attacker)-[pe:CAN_PRIVESC]->(victim)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'ecs:ExecuteCommand',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
