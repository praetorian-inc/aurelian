id: aws/enrich/privesc/method_30
name: IAM PassRole + CloudFormation UpdateStack Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with both iam:PassRole and cloudformation:UpdateStack permissions
  that can update existing stacks with elevated IAM roles.
severity: high
order: 130
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[update]->(service_resource)
  WHERE type(update) = 'CLOUDFORMATION_UPDATESTACK'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + cloudformation:UpdateStack',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
