id: aws/enrich/privesc/method_34
name: IAM PassRole + CodeBuild UpdateProject Privilege Escalation
platform: aws
type: enrich
category: privesc
description: |
  Detects principals with iam:PassRole and codebuild:UpdateProject permissions
  that can update CodeBuild projects to use elevated service roles.
severity: high
order: 134
cypher: |
  MATCH (attacker:Principal)-[passrole]->(target)
  WHERE type(passrole) = 'IAM_PASSROLE'
  WITH attacker
  MATCH (attacker)-[update]->(service_resource)
  WHERE type(update) = 'CODEBUILD_UPDATEPROJECT'
  MERGE (attacker)-[pe:CAN_PRIVESC]->(service_resource)
  ON CREATE SET pe._created = timestamp()
  SET pe.method = 'iam:PassRole + codebuild:UpdateProject',
      pe.severity = 'high',
      pe._updated = timestamp()
  RETURN count(pe) as edges_created
