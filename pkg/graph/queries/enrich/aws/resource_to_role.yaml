id: aws/enrich/resource_to_role
name: Resource to Role Mapping
platform: aws
type: enrich
category: resource-to-role
description: |
  Links EC2 instances and Lambda functions to their IAM roles.
  Role.InstanceProfileList is a JSON STRING (array-of-objects each carrying a quoted
  "Arn":"arn:aws:iam::<acct>:instance-profile/<name>"), not a Neo4j list, so the EC2
  match QUOTE-BINDS the instance's IamInstanceProfile ARN ('"' + arn + '"') as a
  substring of the role's InstanceProfileList rather than parsing it (no APOC). Binding
  the surrounding quotes stops a shorter profile ARN (instance-profile/ip) from
  prefix-colliding with a longer one (instance-profile/ip-2). Falls back to a direct
  Role-ARN match (Lambda functions and instances that emit Role directly).
severity: info
order: 1
cypher: |
  MATCH (role:Role)
  MATCH (resource:Resource)
  WHERE resource._resourceType IN ['AWS::EC2::Instance', 'AWS::Lambda::Function']
  AND (
    resource.Role = role.Arn
    OR (
      role.InstanceProfileList IS NOT NULL
      AND resource.IamInstanceProfile IS NOT NULL
      AND role.InstanceProfileList CONTAINS ('"' + resource.IamInstanceProfile + '"')
    )
  )
  MERGE (resource)-[:HAS_ROLE]->(role)
  RETURN count(*) as links_created
