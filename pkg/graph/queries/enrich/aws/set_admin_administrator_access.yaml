id: aws/enrich/set_admin_administrator_access
name: Flag AdministratorAccess Principals
platform: aws
type: enrich
category: admin-detection
description: |
  Flags principals with the AWS managed AdministratorAccess policy as admin.
severity: high
order: 10
cypher: |
  // AttachedManagedPolicies flattens to a JSON STRING (array-of-objects), not a
  // Neo4j list — ANY(... IN ...) iterated string characters and never matched.
  // CONTAINS the policy name is the no-APOC fix.
  MATCH (p:Principal)
  WHERE coalesce(p.AttachedManagedPolicies, '') CONTAINS 'AdministratorAccess'
  SET p._is_admin = true,
      p._admin_reason = 'AdministratorAccess managed policy'
  RETURN count(p) as admin_principals
